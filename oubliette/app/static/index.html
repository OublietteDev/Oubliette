<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oubliette Table — The Phantom's Table</title>
<style>
  :root {
    --bg: #14110f; --panel: #1d1916; --panel-2: #241f1c;
    --ink: #e9e0d2; --muted: #a99d88; --faint: #6f6555;
    --gold: #d9b25a; --accent: #b8743a; --accent-2: #7d9a6b;
    --player: #2b3a4a; --dm: #221d18; --line: #3a322a;
    --good: #7d9a6b; --bad: #b9533f; --prov: #9a7bb0;
    --shadow: 0 8px 30px rgba(0,0,0,.45);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: system-ui, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 70% -10%, #2a221b 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #20302c 0%, transparent 55%),
      var(--bg);
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(0,0,0,.25), transparent);
  }
  header .brand { display: flex; flex-direction: column; }
  header h1 {
    font-family: var(--serif); font-size: 22px; margin: 0; letter-spacing: .3px;
    color: var(--gold);
  }
  header .tag { font-size: 12px; color: var(--muted); font-style: italic; }
  header .spacer { flex: 1; }
  .badge {
    font-size: 11px; color: var(--muted); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 10px; background: var(--panel);
  }
  button.act {
    font: inherit; font-size: 13px; color: var(--ink); cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 13px; transition: border-color .15s, background .15s;
  }
  button.act:hover { border-color: var(--accent); background: #2a231d; }

  main { display: grid; grid-template-columns: 1fr 320px; flex: 1; min-height: 0; }

  /* chat column */
  .chat { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--line); }
  .log { flex: 1; overflow-y: auto; padding: 24px 26px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; }
  .row.player { justify-content: flex-end; }
  .msg {
    max-width: 76%; padding: 12px 16px; border-radius: 14px; line-height: 1.55;
    box-shadow: var(--shadow); white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.dm { background: var(--dm); border: 1px solid var(--line); border-top-left-radius: 4px; font-family: var(--serif); font-size: 16px; }
  .msg.player { background: var(--player); border: 1px solid #34495c; border-top-right-radius: 4px; }
  .msg.system { background: transparent; border: 1px dashed var(--line); color: var(--muted); font-size: 13px; font-style: italic; max-width: 90%; }
  .who { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--faint); margin-bottom: 5px; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .chip {
    font-size: 11.5px; padding: 4px 9px; border-radius: 7px; border: 1px solid var(--line);
    background: #00000022; color: var(--muted); display: inline-flex; gap: 6px; align-items: center;
  }
  .chip .k { color: var(--faint); }
  .chip.roll.success { border-color: #41613f; color: #bcd4a8; }
  .chip.roll.failure { border-color: #6e3a30; color: #e0a99a; }
  .chip.effect { border-color: #5a4a2e; color: var(--gold); }
  .chip.combat { border-color: #6e3a30; color: #e0a99a; }
  .chip.meta { border-color: #4a4358; color: #c3b6d6; }

  .composer { border-top: 1px solid var(--line); padding: 14px 18px; display: flex; gap: 10px; background: rgba(0,0,0,.18); }
  .composer textarea {
    flex: 1; resize: none; height: 46px; max-height: 160px; padding: 12px 14px;
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 10px; font: inherit; font-size: 15px; line-height: 1.4;
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); }
  .composer button {
    align-self: stretch; padding: 0 20px; border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(180deg, var(--accent), #9c5f2e); color: #fff; font: inherit; font-weight: 600;
  }
  .composer button:disabled { opacity: .5; cursor: default; }

  .thinking { color: var(--muted); font-style: italic; font-size: 14px; display: flex; gap: 8px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.1s infinite; }
  .dot:nth-child(2){ animation-delay:.18s } .dot:nth-child(3){ animation-delay:.36s }
  @keyframes pulse { 0%,100%{opacity:.25; transform: translateY(0)} 50%{opacity:1; transform: translateY(-3px)} }

  /* sidebar */
  aside { background: var(--panel); overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 18px; }
  .card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
  .card h2 { margin: 0 0 10px; font-family: var(--serif); font-size: 15px; color: var(--gold); letter-spacing: .3px; }
  .sheet-name { font-family: var(--serif); font-size: 18px; }
  .hpbar { height: 9px; border-radius: 6px; background: #2c2420; overflow: hidden; margin: 8px 0 6px; border: 1px solid var(--line); }
  .hpfill { height: 100%; background: linear-gradient(90deg, #7d9a6b, #b9533f); transition: width .4s; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .stats b { color: var(--ink); font-weight: 600; }
  .gold b { color: var(--gold); }
  .list { list-style: none; margin: 8px 0 0; padding: 0; display: flex; flex-direction: column; gap: 6px; font-size: 13.5px; }
  .list li { display: flex; justify-content: space-between; gap: 8px; color: var(--ink); }
  .list li .sub { color: var(--faint); font-size: 12px; }
  .empty { color: var(--faint); font-size: 13px; font-style: italic; }
  .pill { font-size: 10.5px; padding: 2px 7px; border-radius: 999px; border: 1px solid var(--line); text-transform: uppercase; letter-spacing: .08em; }
  .pill.confirmed { color: #bcd4a8; border-color: #41613f; }
  .pill.provisional { color: #c3b6d6; border-color: #4a4358; }
  .canon-name { font-family: var(--serif); }
  .canon-text { color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.45; }
  .scene { font-style: italic; color: var(--muted); font-size: 13px; line-height: 1.5; }
  ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: #2e2722; border-radius: 8px; }

  /* trade window (modal) */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.62); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .overlay.hidden { display: none; }
  .trade-modal { width: min(740px, 92vw); max-height: 86vh; display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--accent); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .trade-head { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, rgba(0,0,0,.25), transparent); }
  .trade-head h2 { margin: 0; font-family: var(--serif); color: var(--gold); font-size: 18px; }
  .trade-head .spacer { flex: 1; }
  .trade-head .tgold { font-size: 13px; color: var(--muted); }
  .trade-head .tgold b { color: var(--gold); }
  .trade-msg { padding: 8px 18px 0; color: #e0a99a; font-size: 13px; }
  .trade-msg:empty { display: none; }
  .trade-cols { display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
  .trade-col { padding: 14px 18px; overflow-y: auto; max-height: 64vh; }
  .trade-col + .trade-col { border-left: 1px solid var(--line); }
  .trade-col h3 { margin: 0 0 10px; font-size: 11.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); }
  .trade-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .trade-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; }
  .trade-row .info { flex: 1; min-width: 0; }
  .trade-row .nm { font-family: var(--serif); font-size: 14.5px; }
  .trade-row .meta { font-size: 12px; color: var(--faint); }
  .trade-row .price { color: var(--gold); font-weight: 600; font-size: 13px; white-space: nowrap; }
  .trade-row button { font: inherit; font-size: 12.5px; cursor: pointer; border-radius: 7px; padding: 6px 13px; border: 1px solid var(--line); background: #2a231d; color: var(--ink); }
  .trade-row button:hover:not(:disabled) { border-color: var(--accent); }
  .trade-row button:disabled { opacity: .35; cursor: default; }
  .trade-empty { color: var(--faint); font-style: italic; font-size: 13px; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Oubliette Table</h1>
      <div class="tag">Join the Phantom's Table</div>
    </div>
    <div class="spacer"></div>
    <span class="badge" id="model-badge">…</span>
    <button class="act" id="new-btn">New Game</button>
  </header>

  <main>
    <section class="chat">
      <div class="log" id="log"></div>
      <div class="composer">
        <textarea id="input" placeholder="What do you do?  (Enter to send · Shift+Enter for a new line)"></textarea>
        <button id="send">Send</button>
      </div>
    </section>

    <aside>
      <div class="card" id="scene-card">
        <h2>The Scene</h2>
        <div class="scene" id="scene"></div>
      </div>
      <div class="card">
        <h2>Character</h2>
        <div class="sheet-name" id="pc-name">—</div>
        <div class="hpbar"><div class="hpfill" id="hpfill"></div></div>
        <div class="stats">
          <span id="hp"></span>
          <span class="gold">Gold <b id="gold">0</b></span>
          <span>XP <b id="xp">0</b></span>
          <span>AC <b id="ac">0</b></span>
        </div>
        <div id="conditions" class="stats" style="margin-top:8px"></div>
      </div>
      <div class="card">
        <h2>Inventory</h2>
        <ul class="list" id="inventory"></ul>
      </div>
      <div class="card">
        <h2>Present</h2>
        <ul class="list" id="npcs"></ul>
      </div>
      <div class="card">
        <h2>Canon &amp; Memory</h2>
        <ul class="list" id="canon"></ul>
      </div>
    </aside>
  </main>

<div id="trade-overlay" class="overlay hidden">
  <div class="trade-modal">
    <div class="trade-head">
      <h2 id="trade-title">Trading</h2>
      <div class="spacer"></div>
      <div class="tgold">Your gold <b id="t-pcgold">0</b> · <span id="t-mname">Merchant</span> <b id="t-mgold">0</b></div>
      <button class="act" id="trade-done">Done</button>
    </div>
    <div class="trade-msg" id="trade-msg"></div>
    <div class="trade-cols">
      <div class="trade-col"><h3>For Sale</h3><ul class="trade-list" id="t-buy"></ul></div>
      <div class="trade-col"><h3>Your Goods</h3><ul class="trade-list" id="t-sell"></ul></div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log"), input = $("input"), sendBtn = $("send");

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
function scrollDown() { log.scrollTop = log.scrollHeight; }

function addMessage(who, text, cls) {
  const row = el("div", "row " + cls);
  const msg = el("div", "msg " + cls);
  msg.appendChild(el("div", "who", who));
  msg.appendChild(el("div", null, text));
  row.appendChild(msg);
  log.appendChild(row);
  scrollDown();
  return msg;
}

function addChips(msg, data) {
  const chips = el("div", "chips");
  if (data.roll) {
    const c = el("div", "chip roll " + (data.roll.result || ""));
    c.innerHTML = `<span class="k">🎲 ${data.roll.purpose}</span> ${data.roll.spec} = <b>${data.roll.total}</b> vs DC ${data.roll.dc} → ${data.roll.result}`;
    chips.appendChild(c);
  }
  (data.applied || []).forEach(a => {
    const c = el("div", "chip effect"); c.textContent = "✦ " + a; chips.appendChild(c);
  });
  if (data.combat) {
    const c = el("div", "chip combat"); c.textContent = `⚔ combat → ${data.combat.outcome}` + (data.combat.xp ? ` (+${data.combat.xp} XP)` : ""); chips.appendChild(c);
  }
  if (data.trade) {
    const c = el("div", "chip effect"); c.textContent = "🛒 trading with " + data.trade.merchant_name; chips.appendChild(c);
  }
  if (data.meta_notice) {
    const c = el("div", "chip meta"); c.textContent = "ⓘ " + data.meta_notice; chips.appendChild(c);
  }
  if (chips.children.length) msg.appendChild(chips);
  scrollDown();
}

// --- trade window ---------------------------------------------------------
let tradeMerchant = null;
function openTrade(t) { tradeMerchant = t.merchant_id; renderTrade(t); $("trade-overlay").classList.remove("hidden"); }
function closeTrade() { $("trade-overlay").classList.add("hidden"); tradeMerchant = null; $("trade-msg").textContent = ""; }

function tradeRow(o, kind, playerGold) {
  const li = el("li", "trade-row");
  const info = el("div", "info");
  info.appendChild(el("div", "nm", o.name));
  info.appendChild(el("div", "meta", kind === "buy" ? `${o.qty} in stock` : `you have ${o.qty}`));
  li.appendChild(info);
  li.appendChild(el("div", "price", (kind === "buy" ? o.price : o.offer) + "g"));
  const btn = el("button", null, kind === "buy" ? "Buy" : "Sell");
  if (kind === "buy" && playerGold < o.price) btn.disabled = true;
  if (kind === "sell" && !o.affordable) btn.disabled = true;
  btn.addEventListener("click", () => tradeAction(kind, o.item_id));
  li.appendChild(btn);
  return li;
}
function renderTrade(t) {
  $("trade-title").textContent = "Trading with " + t.merchant_name;
  $("t-pcgold").textContent = t.player_gold;
  $("t-mname").textContent = t.merchant_name + "'s gold";
  $("t-mgold").textContent = t.merchant_gold;
  const buy = $("t-buy"); buy.innerHTML = "";
  if (!t.buy.length) buy.appendChild(el("div", "trade-empty", "nothing for sale"));
  t.buy.forEach(o => buy.appendChild(tradeRow(o, "buy", t.player_gold)));
  const sell = $("t-sell"); sell.innerHTML = "";
  if (!t.sell.length) sell.appendChild(el("div", "trade-empty", "you have nothing to sell"));
  t.sell.forEach(o => sell.appendChild(tradeRow(o, "sell", t.player_gold)));
}
async function tradeAction(action, item_id) {
  try {
    const res = await fetch("/api/trade", {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({ merchant_id: tradeMerchant, action, item_id, qty: 1 })
    });
    const data = await res.json();
    if (data.trade) renderTrade(data.trade);
    if (data.state) renderState(data.state);
    $("trade-msg").textContent = data.ok ? "" : (data.error || "");
  } catch (e) { $("trade-msg").textContent = "Error: " + e; }
}
$("trade-done").addEventListener("click", closeTrade);
$("trade-overlay").addEventListener("click", (e) => { if (e.target.id === "trade-overlay") closeTrade(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeTrade(); });

function renderState(s) {
  $("scene").textContent = s.scene || "";
  const pc = s.pc;
  $("pc-name").textContent = pc.name;
  $("hp").textContent = `HP ${pc.hp}/${pc.max_hp}`;
  $("hpfill").style.width = Math.max(0, Math.min(100, 100 * pc.hp / pc.max_hp)) + "%";
  $("gold").textContent = pc.gold;
  $("xp").textContent = pc.xp;
  $("ac").textContent = pc.armor_class;
  const cond = $("conditions");
  cond.textContent = pc.conditions.length ? "Conditions: " + pc.conditions.join(", ") : "";

  const inv = $("inventory"); inv.innerHTML = "";
  if (!pc.inventory.length) inv.appendChild(el("div", "empty", "empty-handed"));
  pc.inventory.forEach(it => {
    const li = el("li"); li.appendChild(el("span", null, it.name));
    li.appendChild(el("span", "sub", "×" + it.qty)); inv.appendChild(li);
  });

  const npcs = $("npcs"); npcs.innerHTML = "";
  if (!s.npcs.length) npcs.appendChild(el("div", "empty", "no one nearby"));
  s.npcs.forEach(n => {
    const li = el("li");
    const left = el("span", null, n.name);
    li.appendChild(left);
    li.appendChild(el("span", "sub", n.gold + "g")); npcs.appendChild(li);
  });

  const canon = $("canon"); canon.innerHTML = "";
  if (!s.canon.length) canon.appendChild(el("div", "empty", "no canon yet — the world is unwritten"));
  s.canon.forEach(r => {
    const li = el("li"); li.style.flexDirection = "column"; li.style.alignItems = "stretch";
    const top = el("div"); top.style.display = "flex"; top.style.justifyContent = "space-between"; top.style.gap = "8px";
    top.appendChild(el("span", "canon-name", r.name));
    top.appendChild(el("span", "pill " + r.status, r.status));
    li.appendChild(top);
    if (r.text) li.appendChild(el("div", "canon-text", r.text));
    canon.appendChild(li);
  });
}

let busy = false;
function setBusy(b) {
  busy = b; sendBtn.disabled = b; input.disabled = b;
  if (!b) input.focus();
}

async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  input.value = "";
  addMessage("You", text, "player");
  setBusy(true);
  const thinkRow = el("div", "row dm");
  const think = el("div", "msg dm");
  think.innerHTML = `<div class="thinking"><span>The Phantom considers</span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  thinkRow.appendChild(think); log.appendChild(thinkRow); scrollDown();
  try {
    const res = await fetch("/api/turn", {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    thinkRow.remove();
    if (data.error) { addMessage("System", data.error, "system"); }
    else {
      const msg = addMessage("The Phantom", data.narration, "dm");
      addChips(msg, data);
      if (data.state) renderState(data.state);
      if (data.trade) openTrade(data.trade);
    }
  } catch (e) {
    thinkRow.remove();
    addMessage("System", "Connection lost: " + e, "system");
  } finally { setBusy(false); }
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("new-btn").addEventListener("click", async () => {
  if (busy) return;
  if (!confirm("Start a new game? This erases the current save.")) return;
  const res = await fetch("/api/new", { method: "POST" });
  const data = await res.json();
  closeTrade();
  log.innerHTML = "";
  addMessage("System", "A new tale begins. Describe what you do.", "system");
  renderState(data.state);
});

async function boot() {
  const res = await fetch("/api/state");
  const data = await res.json();
  $("model-badge").textContent = (data.model === "anthropic" ? "● live DM" : "○ scripted DM");
  renderState(data.state);
  addMessage("System", "The Phantom waits at the head of the table. Describe what you do to begin.", "system");
  input.focus();
}
boot();
</script>
</body>
</html>
