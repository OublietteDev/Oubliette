<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.009" numOctaves="4" seed="11" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.42  0 0 0 0 0.32  0 0 0 0 0.16  0 0 0 0.12 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="blot"><feGaussianBlur stdDeviation="6"/></filter>
    <radialGradient id="vign" cx="50%" cy="46%" r="75%">
      <stop offset="58%" stop-color="#3a2c14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a2c14" stop-opacity="0.13"/>
    </radialGradient>
  </defs>
  <rect width="600" height="760" fill="#ecdfba" filter="url(#grain)"/>
  <g filter="url(#soft)" fill="none" stroke="#7a5a28">
    <circle cx="452" cy="150" r="52" stroke-width="7" opacity="0.13"/>
    <circle cx="452" cy="150" r="45" stroke-width="2.5" opacity="0.10"/>
    <circle cx="150" cy="600" r="38" stroke-width="6" opacity="0.11"/>
    <circle cx="150" cy="600" r="32" stroke-width="2" opacity="0.08"/>
  </g>
  <g filter="url(#blot)" fill="#6e4f22">
    <ellipse cx="470" cy="166" rx="16" ry="10" opacity="0.10"/>
    <ellipse cx="60" cy="330" rx="24" ry="30" opacity="0.08"/>
    <ellipse cx="560" cy="710" rx="34" ry="18" opacity="0.10"/>
    <ellipse cx="240" cy="60" rx="14" ry="8" opacity="0.07"/>
  </g>
  <rect width="600" height="760" fill="url(#vign)"/>
</svg>
