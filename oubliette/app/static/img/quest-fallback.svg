<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A quest">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#2a221b"/>
      <stop offset="62%" stop-color="#1b1713"/>
      <stop offset="100%" stop-color="#14110f"/>
    </radialGradient>
  </defs>
  <rect width="800" height="220" fill="url(#bg)"/>
  <!-- faint surrounding stars -->
  <g fill="#d9b25a" opacity="0.35">
    <circle cx="150" cy="60" r="1.6"/><circle cx="250" cy="150" r="1.2"/>
    <circle cx="640" cy="70" r="1.6"/><circle cx="560" cy="160" r="1.2"/>
    <circle cx="700" cy="130" r="1.4"/><circle cx="110" cy="140" r="1.2"/>
  </g>
  <!-- a compass star: the mark of a journey begun -->
  <g transform="translate(400,110)" stroke="#d9b25a" fill="none">
    <circle r="58" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle r="70" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M0,-74 L13,-13 L74,0 L13,13 L0,74 L-13,13 L-74,0 L-13,-13 Z"
          fill="#d9b25a" fill-opacity="0.16" stroke="#d9b25a" stroke-opacity="0.8" stroke-width="1.5"/>
    <path d="M0,-40 L7,-7 L40,0 L7,7 L0,40 L-7,7 L-40,0 L-7,-7 Z"
          fill="#d9b25a" fill-opacity="0.28" stroke="none"/>
    <circle r="3.5" fill="#d9b25a" stroke="none"/>
  </g>
</svg>
