<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oubliette: The Forge</title>
<style>
  :root {
    --bg: #14110f; --panel: #1d1916; --panel-2: #241f1c;
    --ink: #e9e0d2; --muted: #a99d88; --faint: #6f6555;
    --gold: #d9b25a; --accent: #b8743a; --accent-2: #7d9a6b;
    --line: #3a322a; --good: #7d9a6b; --bad: #b9533f;
    --shadow: 0 8px 30px rgba(0,0,0,.45);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: system-ui, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 70% -10%, #2a221b 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #20302c 0%, transparent 55%),
      var(--bg);
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(0,0,0,.25), transparent);
  }
  header h1 {
    font-family: var(--serif); font-size: 22px; margin: 0; letter-spacing: .3px;
    color: var(--gold); text-shadow: 0 0 18px rgba(217, 178, 90, .25);
  }
  header .tag { font-size: 12px; color: var(--muted); font-style: italic; margin-left: 4px; }
  header .spacer { flex: 1; }
  .badge { font-size: 11px; color: var(--muted); border: 1px solid var(--line);
           border-radius: 999px; padding: 4px 10px; background: var(--panel); }
  #dirty { font-size: 12px; color: var(--accent); font-style: italic; display: none; }

  button.btn {
    font: inherit; font-size: 13px; color: var(--ink); cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 13px; transition: border-color .15s, background .15s;
  }
  button.btn:hover { border-color: var(--accent); background: #2a231d; }
  button.btn:disabled { opacity: .45; cursor: default; }
  button.btn.primary { border-color: var(--gold); color: var(--gold); }
  button.btn.primary:hover:not(:disabled) { background: #2a231d; }
  button.mini { font-size: 11px; padding: 4px 9px; border-radius: 7px; }
  button.danger:hover { border-color: var(--bad); color: var(--bad); }

  main { display: grid; grid-template-columns: 280px 1fr; flex: 1; min-height: 0; }
  .worlds { border-right: 1px solid var(--line); overflow-y: auto; padding: 16px 14px; }
  .worlds h2 { font: 600 12px var(--sans); letter-spacing: .14em; text-transform: uppercase;
               color: var(--faint); margin: 4px 6px 12px; }
  .world { display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 13px; margin-bottom: 9px; color: var(--ink); font: inherit;
    transition: border-color .15s, background .15s; }
  .world:hover { border-color: var(--accent); background: #2a231d; }
  .world.active { border-color: var(--gold); background: #2a231d; }
  .world .wname { font-family: var(--serif); font-size: 15px; color: var(--gold); }
  .world .wmeta { font-size: 11px; color: var(--muted); margin-top: 4px;
                  display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 10px; border-radius: 999px; padding: 2px 8px; border: 1px solid var(--line); }
  .pill.ok { color: var(--good); border-color: #3c4d35; background: #1b2118; }
  .pill.warn { color: var(--bad); border-color: #4d2c25; background: #221715; }
  .pill.note { color: var(--gold); border-color: #4d3f25; background: #221c14; margin-left: 4px; }

  .detail { overflow-y: auto; padding: 22px 28px; }
  .empty { color: var(--muted); font-style: italic; margin-top: 40px; text-align: center; }
  .detail h2 { font-family: var(--serif); color: var(--gold); margin: 0 0 4px; font-size: 24px; }
  .detail .sub { color: var(--muted); font-size: 12px; margin-bottom: 18px; }

  .status { border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .status.ok { background: #1b2118; border: 1px solid #3c4d35; }
  .status.warn { background: #221715; border: 1px solid #4d2c25; }
  .status.dirty { background: #221c14; border: 1px solid #4d3f25; }
  .status .stitle { font-weight: 600; font-size: 15px; }
  .status.ok .stitle { color: var(--good); }
  .status.warn .stitle { color: var(--bad); }
  .status.dirty .stitle { color: var(--accent); }
  .status.note { background: #221c14; border: 1px solid #4d3f25; }
  .status.note .stitle { color: var(--gold); }
  .cue.missing { border-color: var(--bad); }
  .cue-warn { font-size: 11.5px; color: var(--bad); margin-bottom: 7px; line-height: 1.35; }
  .status ul { margin: 10px 0 0; padding-left: 18px; }
  .status li { font-size: 13px; color: var(--ink); margin: 4px 0; line-height: 1.4; }

  .group { margin-bottom: 22px; }
  .group .ghead { display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-bottom: 10px; }
  .group .gtoggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .group .gtoggle:hover h3 { color: var(--muted); }
  .group .chev { font-size: 9px; color: var(--faint); transition: transform .15s; }
  .group h3 { font: 600 12px var(--sans); letter-spacing: .12em; text-transform: uppercase;
              color: var(--faint); margin: 0; }
  .group .count { color: var(--muted); font-weight: 400; }
  .group .gspacer { flex: 1; }
  .group.collapsed .chev { transform: rotate(-90deg); }
  .group.collapsed .gcards { display: none; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
  .card .cbody { flex: 1; min-width: 0; }
  .card .cname { font-family: var(--serif); font-size: 15px; color: var(--ink); }
  .card .cline { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
  .card .cactions { display: flex; gap: 6px; flex-shrink: 0; }
  .nothing { color: var(--faint); font-style: italic; font-size: 13px; }
  .readonly-note { font-size: 11px; color: var(--faint); font-style: italic; }
  .sec-warn { font-size: 10px; color: var(--bad); border: 1px solid #4d2c25;
    background: #221715; border-radius: 999px; padding: 2px 8px; }
  .worlds-head { display: flex; align-items: center; gap: 8px; margin: 4px 6px 12px; }
  .worlds-head h2 { margin: 0; flex: 1; }

  /* modal editor */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
    align-items: center; justify-content: center; z-index: 50; }
  .scrim.open { display: flex; }
  .modal { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px;
    width: min(560px, 92vw); max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal .mhead { padding: 16px 20px; border-bottom: 1px solid var(--line);
    font-family: var(--serif); color: var(--gold); font-size: 18px; }
  .modal .mbody { padding: 18px 20px; }
  .modal .mfoot { padding: 14px 20px; border-top: 1px solid var(--line);
    display: flex; justify-content: flex-end; gap: 10px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field .help { font-size: 11px; color: var(--faint); font-style: italic; margin-top: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; font: inherit; font-size: 14px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .subform { border: 1px dashed var(--line); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 14px; background: rgba(0,0,0,.15); }
  .subform .sftitle { font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 10px; }
  .exit-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .cue { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; margin-bottom: 9px; background: rgba(0,0,0,.12); }
  .cue-row { display: flex; gap: 8px; align-items: center; margin-bottom: 7px; }
  .cue-row:last-child { margin-bottom: 0; }
  .cue-row select { flex: 1; min-width: 0; font-size: 13px; }
  .cue-vol { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); flex: 1; }
  .cue-vol input[type=range] { flex: 1; accent-color: var(--accent); }
  .cue-gap { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .cue-gap input { width: 52px; font-size: 13px; }
  .cue-when { font-size: 12px; color: var(--faint); align-self: center; }
  .loot-row { display: grid; grid-template-columns: 1fr 70px auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .shop-row { display: grid; grid-template-columns: 1fr 64px 80px auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .ability-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ability-grid .field { margin-bottom: 0; }
  .invalid { color: var(--bad); font-size: 12px; margin-top: 6px; min-height: 16px; }
  /* illustration preview — mirrors the game's quest-card image frame so "fit" is honest */
  .illus-frame { width: 100%; height: 175px; background: var(--bg); border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .illus-frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .illus-empty { color: var(--faint); font-size: 12px; font-style: italic; padding: 0 16px; text-align: center; }

  /* map editor (arrange places spatially; positions persist into places.json) */
  .map-scrim { position: fixed; inset: 0; display: none; z-index: 70;
    background:
      radial-gradient(1200px 600px at 70% -10%, #2a221b 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #20302c 0%, transparent 55%),
      var(--bg); }
  .map-scrim.open { display: flex; flex-direction: column; }
  .map-head { display: flex; align-items: center; gap: 12px; padding: 14px 22px;
    border-bottom: 1px solid var(--line); background: linear-gradient(180deg, rgba(0,0,0,.3), transparent); }
  .map-head h2 { font-family: var(--serif); color: var(--gold); margin: 0; font-size: 20px; }
  .map-head .tag { font-size: 12px; color: var(--muted); font-style: italic; }
  .map-head .spacer { flex: 1; }
  .map-body { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 14px 22px 22px; }
  .map-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .crumbs { font-family: var(--serif); font-size: 15px; }
  .crumb { color: var(--gold); cursor: pointer; }
  .crumb:hover { text-decoration: underline; }
  .crumb.here { color: var(--ink); cursor: default; }
  .crumb.here:hover { text-decoration: none; }
  .crumb-sep { color: var(--faint); margin: 0 7px; }
  .map-hint { font-size: 12px; color: var(--muted); font-style: italic; }
  .map-bgctl { display: flex; gap: 8px; align-items: center; }
  .map-canvas { position: relative; flex: 1; min-height: 0; border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden;
    background: radial-gradient(circle at 50% 35%, #1e2724 0%, #161311 72%); }
  .map-stage { position: absolute; }                 /* the map image's contain-rect; pins are % of THIS */
  .map-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
  .map-edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .map-edges line { stroke: #6f8473; stroke-width: 2; stroke-dasharray: 5 5; opacity: .8; }
  .map-pin { position: absolute; transform: translate(-50%, -100%); cursor: grab; touch-action: none; z-index: 2; }
  .map-pin.dragging { cursor: grabbing; z-index: 8; }
  .map-pin:hover { z-index: 30; }    /* lift the whole pin so its tooltip clears other pins */
  .pin-dot { width: 22px; height: 22px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    background: var(--accent); border: 1.5px solid #1c130b; box-shadow: 0 3px 6px rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center; }
  .map-pin.area .pin-dot { background: var(--gold); }
  .map-pin:hover .pin-dot { filter: brightness(1.15); }
  .pin-glyph { transform: rotate(45deg); font-size: 10px; line-height: 1; color: #1a1410; }
  .map-pin .tip { position: absolute; left: 50%; top: calc(100% + 6px); transform: translateX(-50%);
    display: none; width: max-content; min-width: 120px; max-width: 340px;
    background: var(--panel-2); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 11px;
    box-shadow: var(--shadow); z-index: 9; text-align: left; pointer-events: none; }
  .map-pin:hover .tip { display: block; }
  /* keep the tooltip on-canvas: flip above for low pins, nudge in at the L/R edges */
  .map-pin.flip-up .tip { top: auto; bottom: calc(100% + 6px); }
  .map-pin.x-left .tip { left: 50%; right: auto; transform: none; }
  .map-pin.x-right .tip { left: auto; right: 50%; transform: none; }
  .tip .tname { font-family: var(--serif); color: var(--gold); font-size: 13.5px; }
  .tip .tdesc { color: var(--muted); font-size: 12px; margin-top: 4px; line-height: 1.4; max-height: 300px; overflow: hidden; }
  .map-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-style: italic; padding: 0 40px; text-align: center; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: #1b2118; border: 1px solid #3c4d35; color: var(--good);
    padding: 11px 18px; border-radius: 10px; box-shadow: var(--shadow); font-size: 13px;
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 60; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <h1>Oubliette: The Forge</h1>
    <span class="tag">— build a world the game can play</span>
    <span class="spacer"></span>
    <span id="dirty">● unsaved changes</span>
    <button class="btn" id="mapBtn" disabled>🗺 Map</button>
    <button class="btn primary" id="saveBtn" disabled>Save world</button>
    <span class="badge" id="rootBadge"></span>
  </header>
  <main>
    <nav class="worlds">
      <div class="worlds-head"><h2>Worlds</h2><button class="btn mini" id="newWorldBtn">+ New</button></div>
      <div id="worldList"></div>
    </nav>
    <section class="detail" id="detail">
      <div class="empty">Pick a world on the left to open it.</div>
    </section>
  </main>

  <div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>

  <div class="map-scrim" id="mapScrim">
    <div class="map-head">
      <h2>World Map</h2>
      <span class="tag">— drag to arrange your places</span>
      <span class="spacer"></span>
      <button class="btn" id="mapClose">Close</button>
    </div>
    <div class="map-body" id="mapBody"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EDITABLE = new Set(["items", "statblocks", "npcs", "places", "lore", "scenarios"]);
const SINGULAR = { items: "item", statblocks: "creature", npcs: "character", places: "place",
                   lore: "lore entry", scenarios: "opening" };
const TITLES = { items: "Items", statblocks: "Creatures", npcs: "Characters & NPCs",
                 places: "Places", lore: "Lore", scenarios: "Opening setup" };
const ORDER = ["items", "statblocks", "npcs", "places", "lore", "scenarios"];
const CATEGORIES = ["weapon", "armor", "gear", "consumable", "treasure", "misc"];
const SLOTS = ["", "main_hand", "off_hand", "body", "feet", "hands", "waist", "head", "neck", "ring"];
const ARMOR_TYPES = ["light", "medium", "heavy", "shield"];

let state = { id: null, contents: null, validation: null, dirty: false };
const collapsed = new Set();   // folded sections, remembered across re-renders
let secCounts = {};            // per-section issue counts from the last validation

// --- helpers ---------------------------------------------------------------
const slugify = s => (String(s).toLowerCase().trim().replace(/[^a-z0-9]+/g, "_")
                        .replace(/^_+|_+$/g, "")) || "thing";
function uniqueId(base, existing) {
  if (!existing.has(base)) return base;
  let n = 2; while (existing.has(`${base}_${n}`)) n++; return `${base}_${n}`;
}
const listOf = kind => Array.isArray(state.contents?.[kind]) ? state.contents[kind] : [];
const csv = s => String(s || "").split(",").map(x => x.trim()).filter(Boolean);

function markDirty() {
  state.dirty = true;
  document.getElementById("dirty").style.display = "inline";
  document.getElementById("saveBtn").disabled = false;
  render();
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

// --- worlds list -----------------------------------------------------------
async function loadWorlds() {
  const { packs } = await (await fetch("/api/packs")).json();
  const list = document.getElementById("worldList");
  if (!packs.length) { list.innerHTML = '<div class="nothing">No worlds found yet.</div>'; return; }
  list.innerHTML = packs.map(p => `
    <button class="world${p.id === state.id ? " active" : ""}" data-id="${esc(p.id)}">
      <div class="wname">${esc(p.name)}</div>
      <div class="wmeta"><span>v${esc(p.version || "?")}</span>
        ${p.ok ? `<span class="pill ok">✓ ready</span>${p.warning_count ? `<span class="pill note">♪ ${p.warning_count}</span>` : ""}`
               : `<span class="pill warn">⚠ ${p.issue_count} to fix</span>`}</div>
    </button>`).join("");
  list.querySelectorAll(".world").forEach(b =>
    b.addEventListener("click", () => tryOpenWorld(b.dataset.id)));
}

async function tryOpenWorld(id) {
  if (state.dirty && !confirm("You have unsaved changes. Discard them and open another world?")) return;
  await openWorld(id);
}
async function openWorld(id) {
  const data = await (await fetch(`/api/pack/${encodeURIComponent(id)}`)).json();
  if (data.error) { toast(data.error); return; }
  state = { id, contents: data.contents, validation: data.validation, dirty: false,
            audioFiles: data.audio_files || [] };
  document.getElementById("dirty").style.display = "none";
  document.getElementById("saveBtn").disabled = true;
  render(); loadWorlds();
}

// --- friendly one-liners ---------------------------------------------------
function placeName(id) {
  const p = listOf("places").find(x => x.id === id);
  return p ? p.name : id;
}
// A <select>'s options for picking an existing thing of `kind` by friendly name.
function optionList(kind, selected, noneLabel) {
  const none = noneLabel != null ? `<option value="">${esc(noneLabel)}</option>` : "";
  return none + listOf(kind).map(e =>
    `<option value="${esc(e.id)}"${e.id === selected ? " selected" : ""}>${esc(e.name || e.id)}</option>`).join("");
}
// Merchant rows fold inventory + price_list together: one row per held item, with
// an optional price (set = for sale). This makes "you can't price what you don't
// stock" impossible to violate.
function buildInvRows(npc) {
  const pl = (npc && npc.price_list) || {};
  return ((npc && npc.inventory) || []).map(e =>
    ({ item: e.item, qty: e.qty || 1, price: (e.item in pl) ? pl[e.item] : "" }));
}
function describe(kind, e) {
  if (kind === "items") {
    const bits = [e.category];
    if (e.base_value != null) bits.push(`worth ~${e.base_value}g`);
    if (e.armor) bits.push(`armor ${e.armor.base_ac}`);
    if (e.weapon) bits.push(`weapon ${e.weapon.damage}`);
    return bits.filter(Boolean).join(" · ") + (e.description ? ` — ${e.description}` : "");
  }
  if (kind === "statblocks") return `${e.kind} · ${e.hp} HP · defense ${e.armor_class} · worth ${e.xp} XP`;
  if (kind === "npcs") {
    const where = e.home_location ? ` · lives at ${placeName(e.home_location)}` : "";
    const shop = e.price_list && Object.keys(e.price_list).length ? ` · sells ${Object.keys(e.price_list).length} item(s)` : "";
    return `${e.role || "person"}${where}${shop}${e.disposition ? ` — ${e.disposition}` : ""}`;
  }
  if (kind === "places") {
    const inside = e.parent ? `in ${placeName(e.parent)} · ` : "";
    const exits = (e.exits || []).map(x => x.label || placeName(x.to)).join(", ");
    const snd = (e.sounds || []).length;
    return inside + (e.description || "") + (exits ? `  ↪ exits: ${exits}` : "") + (snd ? `  · ♪ ${snd}` : "");
  }
  if (kind === "scenarios") {
    const party = (e.default_party || []).length;
    return `starts at ${placeName(e.start_location)}${party ? ` · ${party} starting hero(es)` : ""}`;
  }
  if (kind === "lore") {
    const about = (e.subjects || []).length ? `about ${(e.subjects || []).join(", ")} — ` : "";
    const body = (e.text || "").replace(/\s+/g, " ");
    return about + (body.length > 120 ? body.slice(0, 120) + "…" : body);
  }
  return "";
}

// --- render ----------------------------------------------------------------
function statusBanner() {
  if (state.dirty)
    return `<div class="status dirty"><div class="stitle">● Unsaved changes — click “Save world” to write them and re-check.</div></div>`;
  const v = state.validation;
  if (!v) return "";
  let html = "";
  if (v.ok) html += `<div class="status ok"><div class="stitle">✓ Ready to play</div></div>`;
  else {
    const msgs = (v.friendly && v.friendly.length) ? v.friendly.map(f => f.message) : v.issues;
    html += `<div class="status warn">
      <div class="stitle">⚠ ${msgs.length} thing(s) to fix before this world will load</div>
      <ul>${msgs.map(m => `<li>${esc(m)}</li>`).join("")}</ul></div>`;
  }
  const w = v.warnings || [];
  if (w.length) html += `<div class="status note">
      <div class="stitle">♪ ${w.length} sound warning(s) — these won’t stop the world from loading</div>
      <ul>${w.map(x => `<li>${esc(x.message)}</li>`).join("")}</ul></div>`;
  return html;
}

function resizeToDataUrl(file, maxW) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      const cx = c.getContext("2d");
      cx.fillStyle = "#14110f"; cx.fillRect(0, 0, w, h);   // flatten onto the theme dark
      cx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      resolve(c.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = () => reject(new Error("could not read that image"));
    img.src = URL.createObjectURL(file);
  });
}

  err.textContent = "";

    editorCtx.image = res.filename;
    renderIllus();
  } catch (e) { toast(String(e.message || e)); }
}

  return new Promise((resolve, reject) => {

    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("could not read that file"));
    r.readAsDataURL(file);
  });
}
async function onUploadAudio(file) {
  const i = _audioUploadIdx; _audioUploadIdx = null;
  try {
    const dataUrl = await fileToDataUrl(file);
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/audio`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: file.name, data: dataUrl }),
    })).json();
    if (res.error) { toast(res.error); return; }
    state.audioFiles = state.audioFiles || [];
    if (!state.audioFiles.includes(res.filename)) { state.audioFiles.push(res.filename); state.audioFiles.sort(); }
    if (i != null && editorCtx.sounds[i]) editorCtx.sounds[i].file = res.filename;
    renderSounds();
    toast("Sound added: " + res.filename);
  } catch (e) { toast(String(e.message || e)); }
}
function previewCue(i) {
  const c = editorCtx.sounds[i];
  if (!c || !c.file) { toast("Pick a sound first."); return; }
  if (_preview) { _preview.pause(); _preview = null; }
  _preview = new Audio(`/api/pack/${encodeURIComponent(state.id)}/audio/${encodeURIComponent(c.file)}`);
  _preview.volume = Math.max(0, Math.min(1, c.gain != null ? c.gain : 1));
  _preview.play().catch(e => toast("Couldn't play that sound: " + (e.message || e)));
}
function cleanCue(c) {
  const o = { file: c.file, kind: c.kind || "bed", category: c.category || "sfx" };
  if (c.scope === "passed_down") o.scope = "passed_down";
  if (c.time && c.time !== "any") o.time = c.time;
  if (c.weather && c.weather !== "any") o.weather = c.weather;
  if (c.gain != null && Math.abs(c.gain - 1) > 1e-6) o.gain = Math.round(c.gain * 100) / 100;
  if (o.kind === "oneshot") {
    if (c.min_gap != null) o.min_gap = c.min_gap;
    if (c.max_gap != null) o.max_gap = c.max_gap;
  }
  return o;
}

// --- map editor (pins on an assignable map image; positions persist to places.json) ---
// A place is a PIN at {x, y} percent of the current map image's "stage" (its contain-
// rect), so pins stay aligned to the art across screen sizes — the game reuses the same
// percentages. Top-level pins sit on the world map (pack.world_map); double-click a ★
// area to drill into ITS map (place.map_image) and arrange the places inside. Two levels
// only — children of children aren't a thing. Exits are still edited in the per-place
// form, but we DRAW them here so the board reads like a map.
let mapPath = [];          // [] = world (top) level; [areaId] = inside that area

const placeById = id => listOf("places").find(p => p.id === id);
const childrenOf = areaId => listOf("places").filter(p => (p.parent || null) === (areaId || null));
const hasChildren = id => listOf("places").some(p => p.parent === id);
const currentAreaId = () => (mapPath.length ? mapPath[mapPath.length - 1] : null);
const mapLevelPlaces = () => childrenOf(currentAreaId());

// Deterministic fallback spot for a place with no authored position (a ring), so
// unplaced places fan out instead of stacking — dragging then pins a real position.
function fallbackPos(i, n) {
  if (n <= 1) return { x: 50, y: 50 };
  const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
  return { x: 50 + Math.cos(ang) * 30, y: 50 + Math.sin(ang) * 30 };
}
function nodePos(p, i, n) {
  const q = p.position;
  if (q && typeof q.x === "number" && typeof q.y === "number") return q;
  return fallbackPos(i, n);
}
// Keep a pin's hover tooltip inside the canvas: flip it above the pin when the pin is
// low, and anchor it inward when the pin is near the left/right edge.
function flipClasses(x, y) {
  return (y > 55 ? " flip-up" : "") + (x < 18 ? " x-left" : (x > 82 ? " x-right" : ""));
}
// The background image for the level we're viewing: the pack's world map at the top,
// or the drilled-into area's own map_image.
function currentBg() {
  const a = currentAreaId();
  if (a == null) return (state.contents.pack && state.contents.pack.world_map) || null;
  const p = placeById(a); return p ? (p.map_image || null) : null;
}

function openMap() { if (!state.contents) return; mapPath = []; document.getElementById("mapScrim").classList.add("open"); renderMap(); }
function closeMap() { document.getElementById("mapScrim").classList.remove("open"); }

function renderMap() {
  const body = document.getElementById("mapBody");
  const places = mapLevelPlaces();
  const n = places.length;
  const inside = currentAreaId() != null;
  const crumbs = [`<span class="crumb${inside ? "" : " here"}" data-crumb="-1">World map</span>`]
    .concat(mapPath.map((id, idx) => {
      const here = idx === mapPath.length - 1;
      return `<span class="crumb-sep">▸</span><span class="crumb${here ? " here" : ""}" data-crumb="${idx}">${esc(placeName(id))}</span>`;
    })).join("");
  const bg = currentBg();
  const bgImg = bg
    ? `<img class="map-bg" id="mapBgImg" src="/api/pack/${encodeURIComponent(state.id)}/image/${encodeURIComponent(bg)}?b=${Date.now()}" alt="" />` : "";
  const pins = places.map((p, i) => {
    const pos = nodePos(p, i, n);
    const isArea = !inside && hasChildren(p.id);   // drillable only from the top level
    const tipDesc = p.description ? `<div class="tdesc">${esc(p.description)}</div>` : "";
    const tipHint = isArea ? `<div class="tdesc" style="color:var(--gold)">▣ double-click to open its map</div>` : "";
    return `<div class="map-pin${isArea ? " area" : ""}${flipClasses(pos.x, pos.y)}" data-node="${esc(p.id)}" style="left:${pos.x}%;top:${pos.y}%">
      <div class="pin-dot"><span class="pin-glyph">${isArea ? "★" : ""}</span></div>
      <div class="tip"><div class="tname">${esc(p.name)}</div>${tipDesc}${tipHint}</div></div>`;
  }).join("");
  const empty = pins ? "" : `<div class="map-empty">No places ${inside ? "inside this area" : "at the top level"} yet — add places (and set their “Part of (area)”) to see them here.</div>`;
  body.innerHTML = `
    <div class="map-top">
      <div class="crumbs">${crumbs}</div>
      <span style="flex:1"></span>
      <div class="map-bgctl">
        <button class="btn mini" id="mapBgSet">${bg ? "Replace map image" : "Set map image"}</button>
        ${bg ? '<button class="btn mini danger" id="mapBgClear">Remove map image</button>' : ""}
        <input type="file" id="mapBgFile" accept="image/png,image/jpeg,image/webp" style="display:none" />
      </div>
    </div>
    <div class="map-hint" style="margin-bottom:8px">Drag pins to place them${inside ? "" : "; double-click a ★ area to arrange the places inside it"}. Hover a pin for its name &amp; description.</div>
    <div class="map-canvas" id="mapCanvas">
      <div class="map-stage" id="mapStage">${bgImg}<svg class="map-edges" id="mapEdges"></svg>${pins}</div>
      ${empty}
    </div>`;
  body.querySelectorAll("[data-crumb]").forEach(c => c.addEventListener("click", () => {
    const idx = +c.dataset.crumb; mapPath = idx < 0 ? [] : mapPath.slice(0, idx + 1); renderMap();
  }));
  body.querySelectorAll("[data-node]").forEach(el => {
    el.addEventListener("pointerdown", e => startNodeDrag(e, el));
    el.addEventListener("dblclick", () => { const id = el.dataset.node; if (currentAreaId() == null && hasChildren(id)) { mapPath = [id]; renderMap(); } });
  });
  document.getElementById("mapBgSet").addEventListener("click", () => document.getElementById("mapBgFile").click());
  document.getElementById("mapBgFile").addEventListener("change", e => { if (e.target.files[0]) onChooseMapBg(e.target.files[0]); });
  const clr = document.getElementById("mapBgClear");
  if (clr) clr.addEventListener("click", clearCurrentBg);
  const img = document.getElementById("mapBgImg");
  if (img) img.addEventListener("load", layoutStage);
  layoutStage();
}

// Size the stage to the map image's contain-rect (or the whole canvas when there's no
// image), so pin percentages land on the same spot of the art everywhere.
function layoutStage() {
  const canvas = document.getElementById("mapCanvas"), stage = document.getElementById("mapStage");
  if (!canvas || !stage) return;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const img = document.getElementById("mapBgImg");
  let sw = cw, sh = ch;
  if (img && img.naturalWidth && img.naturalHeight) {
    const scale = Math.min(cw / img.naturalWidth, ch / img.naturalHeight);
    sw = img.naturalWidth * scale; sh = img.naturalHeight * scale;
  }
  stage.style.width = sw + "px"; stage.style.height = sh + "px";
  stage.style.left = ((cw - sw) / 2) + "px"; stage.style.top = ((ch - sh) / 2) + "px";
  drawEdges();
}

function drawEdges() {
  const stage = document.getElementById("mapStage");
  if (!stage) return;
  const places = mapLevelPlaces(), n = places.length;
  const idx = new Map(places.map((p, i) => [p.id, { p, i }]));
  const W = stage.clientWidth, H = stage.clientHeight;
  const at = (p, i) => { const q = nodePos(p, i, n); return [q.x / 100 * W, q.y / 100 * H]; };
  let lines = "";
  places.forEach((p, i) => {
    const [x1, y1] = at(p, i);
    (p.exits || []).forEach(ex => {
      const t = idx.get(ex.to); if (!t) return;     // only draw exits within this level
      const [x2, y2] = at(t.p, t.i);
      lines += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" />`;
    });
  });
  const svg = document.getElementById("mapEdges");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.innerHTML = lines;
}

function startNodeDrag(e, el) {
  if (e.button != null && e.button !== 0) return;
  const stage = document.getElementById("mapStage");
  const place = placeById(el.dataset.node);
  const startX = e.clientX, startY = e.clientY;
  let dragging = false;
  el.setPointerCapture(e.pointerId);
  const onMove = ev => {
    if (!dragging && Math.hypot(ev.clientX - startX, ev.clientY - startY) < 4) return;  // let dbl-click through
    dragging = true; el.classList.add("dragging");
    const r = stage.getBoundingClientRect();
    const x = Math.max(0, Math.min(100, (ev.clientX - r.left) / r.width * 100));
    const y = Math.max(0, Math.min(100, (ev.clientY - r.top) / r.height * 100));
    el.style.left = x + "%"; el.style.top = y + "%";
    el.classList.toggle("flip-up", y > 55);
    el.classList.toggle("x-left", x < 18);
    el.classList.toggle("x-right", x > 82);
    place.position = { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
    drawEdges();
  };
  const onUp = () => {
    el.releasePointerCapture(e.pointerId);
    el.removeEventListener("pointermove", onMove);
    el.removeEventListener("pointerup", onUp);
    el.classList.remove("dragging");
    if (dragging) markDirty();    // re-renders the (background) detail; the map overlay stays put
  };
  el.addEventListener("pointermove", onMove);
  el.addEventListener("pointerup", onUp);
}

// Assign / replace / clear the background map image for the current level (world map at
// the top; the drilled area's map_image inside). Reuses the pack image upload + the
// browser-side resize the illustration flow already uses.
async function onChooseMapBg(file) {
  try {
    const dataUrl = await resizeToDataUrl(file, 1600);
    const areaId = currentAreaId();
    const baseName = areaId == null
      ? slugify((state.contents.pack && state.contents.pack.name) || "world") + "_map"
      : slugify(placeById(areaId).name) + "_map";
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/image`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: baseName + ".jpg", data: dataUrl }),
    })).json();
    if (res.error) { toast(res.error); return; }
    setCurrentBg(res.filename);
  } catch (e) { toast(String(e.message || e)); }
}
function setCurrentBg(filename) {
  const areaId = currentAreaId();
  if (areaId == null) { state.contents.pack = state.contents.pack || {}; state.contents.pack.world_map = filename; }
  else { const p = placeById(areaId); if (p) p.map_image = filename; }
  markDirty(); renderMap();
}
function clearCurrentBg() {
  const areaId = currentAreaId();
  if (areaId == null) { if (state.contents.pack) delete state.contents.pack.world_map; }
  else { const p = placeById(areaId); if (p) delete p.map_image; }
  markDirty(); renderMap();
}

// --- save ------------------------------------------------------------------
async function saveWorld() {
  if (!state.id || !state.dirty) return;
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/save`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: state.contents }),
  })).json();
  if (res.error) { toast(res.error); btn.disabled = false; return; }
  state.validation = res.validation; state.dirty = false;
  document.getElementById("dirty").style.display = "none";
  render(); loadWorlds();
  toast(res.validation.ok ? "Saved ✓ — previous version backed up" : "Saved — previous version backed up (still has issues to fix)");
}

async function newWorld() {
  if (state.dirty && !confirm("You have unsaved changes. Discard them and start a new world?")) return;
  const name = prompt("Name your new world:");
  if (!name || !name.trim()) return;
  const res = await (await fetch("/api/pack/new", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name.trim() }),
  })).json();
  if (res.error) { toast(res.error); return; }
  await loadWorlds();
  await openWorld(res.id);
  toast("New world created — start adding to it!");
}

document.getElementById("saveBtn").addEventListener("click", saveWorld);
document.getElementById("newWorldBtn").addEventListener("click", newWorld);
document.getElementById("mapBtn").addEventListener("click", openMap);
document.getElementById("mapClose").addEventListener("click", closeMap);
document.getElementById("scrim").addEventListener("click", e => { if (e.target.id === "scrim") closeEditor(); });
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (editorCtx) closeEditor();
  else if (document.getElementById("mapScrim").classList.contains("open")) closeMap();
});
window.addEventListener("resize", () => { if (document.getElementById("mapScrim").classList.contains("open")) layoutStage(); });
document.getElementById("rootBadge").textContent = "reading from content/packs";
loadWorlds();
</script>
