<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oubliette: The Forge</title>
<!-- The house-style tokens (palette/fonts/recipes) are SHARED with the play app —
     served from oubliette/ui/tokens.css by both servers. Never redefine them inline. -->
<link rel="stylesheet" href="/tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 70% -10%, #2a221b 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #20302c 0%, transparent 55%),
      var(--bg);
    color: var(--ink); font-family: var(--sans);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(0,0,0,.25), transparent);
  }
  header h1 {
    font-family: var(--serif); font-size: 22px; margin: 0; letter-spacing: .3px;
    color: var(--gold); text-shadow: 0 0 18px rgba(217, 178, 90, .25);
  }
  header .tag { font-size: 12px; color: var(--muted); font-style: italic; margin-left: 4px; }
  header .spacer { flex: 1; }
  .badge { font-size: 11px; color: var(--muted); border: 1px solid var(--line);
           border-radius: 999px; padding: 4px 10px; background: var(--panel); }
  #dirty { font-size: 12px; color: var(--accent); font-style: italic; display: none; }

  button.btn {
    font: inherit; font-size: 13px; color: var(--ink); cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 13px; transition: border-color .15s, background .15s;
  }
  button.btn:hover { border-color: var(--accent); background: #2a231d; }
  button.btn:disabled { opacity: var(--opacity-disabled); cursor: default; }
  button.btn.primary { border-color: var(--gold); color: var(--gold); }
  button.btn.primary:hover:not(:disabled) { background: #2a231d; }
  button.mini { font-size: 11px; padding: 4px 9px; border-radius: 7px; }
  button.danger:hover { border-color: var(--bad); color: var(--bad); }

  main { display: grid; grid-template-columns: 280px 1fr; flex: 1; min-height: 0; }
  .worlds { border-right: 1px solid var(--line); overflow-y: auto; padding: 16px 14px; }
  .worlds h2 { font: 600 12px var(--sans); letter-spacing: .14em; text-transform: uppercase;
               color: var(--faint); margin: 4px 6px 12px; }
  .world { display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 13px; margin-bottom: 9px; color: var(--ink); font: inherit;
    transition: border-color .15s, background .15s; }
  .world:hover { border-color: var(--accent); background: #2a231d; }
  .world.active { border-color: var(--gold); background: #2a231d; }
  .world .wname { font-family: var(--serif); font-size: 15px; color: var(--gold); }
  .world .wmeta { font-size: 11px; color: var(--muted); margin-top: 4px;
                  display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 10px; border-radius: 999px; padding: 2px 8px; border: 1px solid var(--line); }
  .pill.ok { color: var(--good); border-color: #3c4d35; background: #1b2118; }
  .pill.warn { color: var(--bad); border-color: #4d2c25; background: #221715; }
  .pill.note { color: var(--gold); border-color: #4d3f25; background: #221c14; margin-left: 4px; }

  .detail { overflow-y: auto; padding: 22px 28px; }
  .empty { color: var(--muted); font-style: italic; margin-top: 40px; text-align: center; }
  .detail h2 { font-family: var(--serif); color: var(--gold); margin: 0 0 4px; font-size: 24px; }
  .detail .sub { color: var(--muted); font-size: 12px; margin-bottom: 18px; }

  .status { border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .status.ok { background: #1b2118; border: 1px solid #3c4d35; }
  .status.warn { background: #221715; border: 1px solid #4d2c25; }
  .status.dirty { background: #221c14; border: 1px solid #4d3f25; }
  .status .stitle { font-weight: 600; font-size: 15px; }
  .status.ok .stitle { color: var(--good); }
  .status.warn .stitle { color: var(--bad); }
  .status.dirty .stitle { color: var(--accent); }
  .status.note { background: #221c14; border: 1px solid #4d3f25; }
  .status.note .stitle { color: var(--gold); }
  .cue.missing { border-color: var(--bad); }
  .cue-warn { font-size: 11.5px; color: var(--bad); margin-bottom: 7px; line-height: 1.35; }
  .status ul { margin: 10px 0 0; padding-left: 18px; }
  .status li { font-size: 13px; color: var(--ink); margin: 4px 0; line-height: 1.4; }

  .group { margin-bottom: 22px; }
  .group .ghead { display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-bottom: 10px; }
  .group .gtoggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .group .gtoggle:hover h3 { color: var(--muted); }
  .group .chev { font-size: 9px; color: var(--faint); transition: transform .15s; }
  .group h3 { font: 600 12px var(--sans); letter-spacing: .12em; text-transform: uppercase;
              color: var(--faint); margin: 0; }
  .group .count { color: var(--muted); font-weight: 400; }
  .group .gspacer { flex: 1; }
  .group.collapsed .chev { transform: rotate(-90deg); }
  .group.collapsed .gcards { display: none; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
  .card .cbody { flex: 1; min-width: 0; }
  .card .cname { font-family: var(--serif); font-size: 15px; color: var(--ink); }
  .card .cline { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
  .card .cactions { display: flex; gap: 6px; flex-shrink: 0; }
  .card.card-child { border-left: 3px solid var(--accent); }   /* a child place, indented under its parent */
  .pc-fold { flex: none; width: 22px; align-self: center; background: none; border: none; color: var(--gold); cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 6px; }
  .pc-fold:hover { background: var(--panel); }
  .pc-fold-spacer { flex: none; width: 22px; }
  .pc-fold-count { font-size: 11.5px; color: var(--faint); font-family: var(--sans); font-style: italic; }
  .nothing { color: var(--faint); font-style: italic; font-size: 13px; }
  .readonly-note { font-size: 11px; color: var(--faint); font-style: italic; }
  .sec-warn { font-size: 10px; color: var(--bad); border: 1px solid #4d2c25;
    background: #221715; border-radius: 999px; padding: 2px 8px; }
  .worlds-head { display: flex; align-items: center; gap: 8px; margin: 4px 6px 12px; }
  .worlds-head h2 { margin: 0; flex: 1; }

  /* modal editor */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
    align-items: center; justify-content: center; z-index: 50; }
  .scrim.open { display: flex; }
  .modal { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px;
    width: min(560px, 92vw); max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal .mhead { padding: 16px 20px; border-bottom: 1px solid var(--line);
    font-family: var(--serif); color: var(--gold); font-size: 20px; }  /* matches the play app's modal headers */
  .modal .mbody { padding: 18px 20px; }
  .modal .mfoot { padding: 14px 20px; border-top: 1px solid var(--line);
    display: flex; justify-content: flex-end; gap: 10px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 5px; }  /* gold labels, like the play app's forms */
  .field .help { font-size: 11px; color: var(--faint); font-style: italic; margin-top: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; font: inherit; font-size: 14px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .subform { border: 1px dashed var(--line); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 14px; background: rgba(0,0,0,.15); }
  .subform .sftitle { font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 10px; }
  /* --- UI pass Stage 3 --------------------------------------------------- */
  /* per-field validation: required marks, bad inputs, inline field errors */
  .field label .req { color: var(--bad-soft); margin-left: 2px; }
  .field input.bad, .field textarea.bad, .field select.bad,
  .exit-row select.bad, .shop-row select.bad, .cue select.bad, .branch-row select.bad,
  .branch-row input.bad { border-color: var(--bad); }
  .ferr { color: var(--bad-soft); font-size: 12px; margin-top: 4px; }
  /* nested-editor breadcrumb: says WHOSE sub-thing this modal is editing */
  .crumb { font-size: 12px; color: var(--muted); background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 11px; margin-bottom: 13px; }
  .crumb b { color: var(--gold); font-weight: 600; }
  /* creature-editor tabs */
  .mtabs { display: flex; gap: 6px; margin: 4px 0 16px; border-bottom: 1px solid var(--line); }
  .mtab { font: inherit; font-size: 12.5px; cursor: pointer; background: transparent;
    color: var(--muted); border: 1px solid transparent; border-bottom: none;
    border-radius: 8px 8px 0 0; padding: 7px 13px; }
  .mtab:hover { color: var(--ink); }
  .mtab.on { background: var(--panel); border-color: var(--line); color: var(--gold); }
  .mtab-pane { display: none; }
  .mtab-pane.on { display: block; }
  /* collapsible drawer (heavy sections fold away until needed) */
  details.drawer > summary { cursor: pointer; }
  details.drawer > summary .drawer-note { font-weight: 400; opacity: .7;
    text-transform: none; letter-spacing: 0; margin-left: 6px; }
  details.drawer[open] > summary { margin-bottom: 10px; }
  .exit-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .cue { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; margin-bottom: 9px; background: rgba(0,0,0,.12); }
  /* sound grouping headers + inherited (read-only) cues */
  .cue-group { font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--gold); opacity: .85; margin: 4px 0 6px; }
  .cue.inherited { opacity: .6; pointer-events: none; border-style: dashed; background: rgba(0,0,0,.05); }
  .cue.inherited .cue-inh-file { flex: 1; font-size: 13px; color: var(--ink); }
  .cue.inherited .cue-inh-from { font-size: 11px; color: var(--faint); font-style: italic; }
  .cue.inherited .cue-inh-meta { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  /* keyed-encounter briefing: full-width, comfortably tall, styled like the
     modal's own textareas (it lives in a .cue card, outside any .field) */
  .cue textarea { display: block; width: 100%; box-sizing: border-box; font: inherit;
    font-size: 13px; color: var(--ink); background: var(--bg);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px;
    resize: vertical; min-height: 84px; }
  .cue textarea:focus { outline: none; border-color: var(--accent); }
  .cue-row { display: flex; gap: 8px; align-items: center; margin-bottom: 7px; }
  .cue-row:last-child { margin-bottom: 0; }
  .cue-row select { flex: 1; min-width: 0; font-size: 13px; }
  .cue-vol { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); flex: 1; }
  .cue-vol input[type=range] { flex: 1; accent-color: var(--accent); }
  .cue-gap { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .cue-gap input { width: 52px; font-size: 13px; }
  .cue-when { font-size: 12px; color: var(--faint); align-self: center; }
  .loot-row { display: grid; grid-template-columns: 1fr 70px auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .bgeq-row { display: grid; grid-template-columns: 1fr 1fr 70px auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .shop-row { display: grid; grid-template-columns: 1fr 64px 80px auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .ability-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ability-grid .field { margin-bottom: 0; }
  /* the spell "card" preview (module-kit S3) — what a player would read */
  .spell-preview { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
    background: var(--bg); font-size: 13px; line-height: 1.45; }
  .spell-preview .spv-name { font-weight: 700; font-size: 15px; }
  .spell-preview .spv-school { font-style: italic; color: var(--faint); margin-bottom: 6px; }
  .spell-preview .spv-lines { font-size: 12px; margin-bottom: 8px; }
  .spell-preview .spv-flavor { font-style: italic; margin-bottom: 6px; }
  .spell-preview .spv-mech { margin-bottom: 4px; }
  .spell-preview .spv-classes { font-size: 12px; color: var(--faint); margin-top: 6px; }
  /* pick-from-a-fixed-list checkbox groups (damage types, conditions, skills, languages) */
  .chk-group { display: flex; flex-wrap: wrap; gap: 7px 16px; }
  .chk { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink);
    cursor: pointer; white-space: nowrap; }
  .chk input { width: auto; flex: none; margin: 0; accent-color: var(--accent); }
  /* creature portrait picker — preview chip + choose/remove */
  .portrait-pick { display: flex; align-items: center; gap: 12px; }
  .portrait-prev { width: 64px; height: 64px; flex: none; border-radius: 10px; object-fit: cover;
    border: 1px solid var(--line); background: var(--bg); }
  .portrait-prev.is-empty { border-style: dashed; }
  .portrait-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; min-width: 0; }
  .portrait-actions label.btn { cursor: pointer; }
  /* token previewer — frame the portrait inside the Arena's round token */
  .token-frame-wrap { width: 100%; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .token-frame-row { display: flex; align-items: center; gap: 14px; }
  .token-frame-circle { width: 96px; height: 96px; flex: none; position: relative; overflow: hidden;
    border-radius: 50%; background: #000; border: 2px solid var(--line); cursor: grab; touch-action: none; }
  .token-frame-circle:active { cursor: grabbing; }
  .token-frame-circle img { position: absolute; max-width: none; user-select: none; pointer-events: none; }
  .token-frame-ctrls { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .token-frame-ctrls label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); }
  .token-frame-ctrls input[type="range"] { width: 150px; accent-color: var(--accent); }
  /* clone-from-existing picker */
  .clone-list { max-height: 340px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .clone-row { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 9px 11px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); cursor: pointer; font: inherit; font-size: 14px; }
  .clone-row:hover { border-color: var(--accent); }
  .clone-nm { font-weight: 600; white-space: nowrap; }
  .clone-meta { color: var(--muted); font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .clone-src { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px;
    border-radius: 99px; border: 1px solid var(--line); color: var(--faint); flex: none; }
  .clone-src.srd { color: var(--gold); border-color: var(--gold); }
  /* attacks editor rows: name | melee/ranged | ft | damage | type | ✕ , preview below */
  .atk-row { display: grid; grid-template-columns: 1.4fr .9fr .6fr .9fr 1.1fr auto; gap: 7px;
    align-items: center; margin-bottom: 6px; }
  .atk-row input, .atk-row select { font-size: 13px; padding: 7px 8px; }
  .atk-prev { grid-column: 1 / -1; font-size: 12px; color: var(--gold); opacity: .9; margin: -1px 0 7px 2px; }
  /* special-move blocks (breath, fear, poison) */
  .spc-block { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; margin-bottom: 8px; background: var(--bg); }
  .spc-top { display: flex; gap: 7px; align-items: center; margin-bottom: 7px; }
  .spc-top input { flex: 1; font-weight: 600; }
  .spc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px 8px; }
  .spc-grid label { display: flex; flex-direction: column; gap: 3px; font-size: 11px; color: var(--faint); }
  .spc-grid input, .spc-grid select { font-size: 13px; padding: 6px 7px; }
  .spc-conds { margin-top: 8px; }
  .spc-cl { display: block; font-size: 11px; color: var(--faint); margin-bottom: 5px; }
  .spc-prev { font-size: 12px; color: var(--gold); opacity: .9; margin-top: 8px; }
  .spc-when { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--faint); margin-top: 9px; }
  .spc-when select { flex: 1; font-size: 13px; padding: 6px 7px; }
  /* raw-data editor (the advanced escape hatch) */
  .raw-json { width: 100%; min-height: 360px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: 12.5px; line-height: 1.45; white-space: pre; tab-size: 2; }
  .mfoot-spacer { flex: 1; }
  .invalid { color: var(--bad-soft); font-size: 12px; margin-top: 6px; min-height: 16px; }  /* readable error red on dark panels */
  /* illustration preview — mirrors the game's quest-card image frame so "fit" is honest */
  .illus-frame { width: 100%; height: 175px; background: var(--bg); border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .illus-frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .illus-empty { color: var(--faint); font-size: 12px; font-style: italic; padding: 0 16px; text-align: center; }

  /* map editor (arrange places spatially; positions persist into places.json) */
  .map-scrim { position: fixed; inset: 0; display: none; z-index: 70;
    background:
      radial-gradient(1200px 600px at 70% -10%, #2a221b 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #20302c 0%, transparent 55%),
      var(--bg); }
  .map-scrim.open { display: flex; flex-direction: column; }
  .map-head { display: flex; align-items: center; gap: 12px; padding: 14px 22px;
    border-bottom: 1px solid var(--line); background: linear-gradient(180deg, rgba(0,0,0,.3), transparent); }
  .map-head h2 { font-family: var(--serif); color: var(--gold); margin: 0; font-size: 20px; }
  .map-head .tag { font-size: 12px; color: var(--muted); font-style: italic; }
  .map-head .spacer { flex: 1; }
  .map-body { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 14px 22px 22px; }
  .map-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .crumbs { font-family: var(--serif); font-size: 15px; }
  .crumb { color: var(--gold); cursor: pointer; }
  .crumb:hover { text-decoration: underline; }
  .crumb.here { color: var(--ink); cursor: default; }
  .crumb.here:hover { text-decoration: none; }
  .crumb-sep { color: var(--faint); margin: 0 7px; }
  .map-hint { font-size: 12px; color: var(--muted); font-style: italic; }
  .map-bgctl { display: flex; gap: 8px; align-items: center; }
  .map-canvas { position: relative; flex: 1; min-height: 0; border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden;
    background: radial-gradient(circle at 50% 35%, #1e2724 0%, #161311 72%); }
  .map-stage { position: absolute; }                 /* the map image's contain-rect; pins are % of THIS */
  .map-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
  .map-edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .map-edges line { stroke: #6f8473; stroke-width: 2; stroke-dasharray: 5 5; opacity: .8; }
  .map-pin { position: absolute; transform: translate(-50%, -100%); cursor: grab; touch-action: none; z-index: 2; }
  .map-pin.dragging { cursor: grabbing; z-index: 8; }
  .map-pin:hover { z-index: 30; }    /* lift the whole pin so its tooltip clears other pins */
  .pin-dot { width: 22px; height: 22px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    background: var(--accent); border: 1.5px solid #1c130b; box-shadow: 0 3px 6px rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center; }
  .map-pin.area .pin-dot { background: var(--gold); }
  .map-pin:hover .pin-dot { filter: brightness(1.15); }
  .pin-glyph { transform: rotate(45deg); font-size: 10px; line-height: 1; color: #1a1410; }
  .map-pin .tip { position: absolute; left: 50%; top: calc(100% + 6px); transform: translateX(-50%);
    display: none; width: max-content; min-width: 120px; max-width: 340px;
    background: var(--panel-2); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 11px;
    box-shadow: var(--shadow); z-index: 9; text-align: left; pointer-events: none; }
  .map-pin:hover .tip { display: block; }
  /* keep the tooltip on-canvas: flip above for low pins, nudge in at the L/R edges */
  .map-pin.flip-up .tip { top: auto; bottom: calc(100% + 6px); }
  .map-pin.x-left .tip { left: 50%; right: auto; transform: none; }
  .map-pin.x-right .tip { left: auto; right: 50%; transform: none; }

  <div class="toast" id="toast"></div>

<script>
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EDITABLE = new Set(["items", "statblocks", "npcs", "places", "lore", "quests", "factions", "events", "scenarios", "ai_profiles", "backgrounds", "spells"]);
const SINGULAR = { items: "item", statblocks: "creature", npcs: "character", places: "place",
                   lore: "lore entry", quests: "quest", factions: "faction", events: "world event", scenarios: "opening", ai_profiles: "personality",
                   backgrounds: "background", spells: "spell" };
const TITLES = { items: "Items", statblocks: "Creatures", npcs: "Characters & NPCs",
                 places: "Places", lore: "Lore", quests: "Quests", factions: "Factions", events: "World events", scenarios: "Opening setup",
                 ai_profiles: "AI Personalities", backgrounds: "Backgrounds", spells: "Spells" };
const ORDER = ["items", "statblocks", "npcs", "backgrounds", "spells", "places", "lore", "quests", "factions", "events", "scenarios", "ai_profiles"];
// Faction standing tiers (living-world W2): the Forge authors in tier words;
// the stored default_standing is the tier's representative score.
const FACTION_TIERS = [["hostile", -40, "Hostile"], ["unfriendly", -20, "Unfriendly"],
                       ["neutral", 0, "Neutral"], ["friendly", 20, "Friendly"], ["allied", 40, "Allied"]];
const tierForScore = s => { let out = "Hostile"; FACTION_TIERS.forEach(([, floor, lab]) => { if ((s ?? 0) >= floor - 10) out = lab; }); return out; };
const CATEGORIES = ["weapon", "armor", "gear", "consumable", "treasure", "misc"];
const SLOTS = ["", "main_hand", "off_hand", "body", "feet", "hands", "waist", "head", "neck", "ring"];
const ARMOR_TYPES = ["light", "medium", "heavy", "shield"];
// magic-item contract (schemas.Item): the family list, rarity ladder, and which
// families a +N bonus applies to (mirrors schemas._EQUIPPABLE_MAGIC).
const ITEM_TYPES = ["mundane", "weapon", "armor", "ammunition", "potion", "scroll",
                    "wand", "ring", "rod", "staff", "wondrous", "poison"];
const RARITIES = ["common", "uncommon", "rare", "very rare", "legendary", "artifact"];
const MAGIC_EQUIPPABLE = new Set(["weapon", "armor", "ammunition", "ring", "rod", "staff", "wand", "wondrous"]);
const POISON_TYPES = ["injury", "contact", "ingested", "inhaled"];
// spell-chassis contract (module-kit S3; mirrors schemas.SpellChassis)
const SPELL_SCHOOLS = ["abjuration", "conjuration", "divination", "enchantment",
                       "evocation", "illusion", "necromancy", "transmutation"];
const CASTER_CLASSES = [["bard","Bard"],["cleric","Cleric"],["druid","Druid"],["paladin","Paladin"],
                        ["ranger","Ranger"],["sorcerer","Sorcerer"],["warlock","Warlock"],["wizard","Wizard"]];
const CHASSIS_KINDS = [
  ["bolt",  "Bolt — a spell attack that deals damage (Fire Bolt style)"],
  ["blast", "Blast — an area burst; targets save or take damage (Fireball style)"],
  ["heal",  "Heal — restores hit points to one creature (Cure Wounds style)"],
  ["hex",   "Hex — one target saves or suffers a condition (Hold Person style)"]];
const SPELL_DAMAGE_TYPES = ["acid","bludgeoning","cold","fire","force","lightning","necrotic",
                            "piercing","poison","psychic","radiant","slashing","thunder"];
const BLAST_SHAPES = ["sphere", "cone", "line", "cube"];
const HEX_CONDITIONS = [["blinded","Blinded"],["charmed","Charmed"],["deafened","Deafened"],
                        ["frightened","Frightened"],["paralyzed","Paralyzed"],["poisoned","Poisoned"],
                        ["restrained","Restrained"],["stunned","Stunned"]];
const DICE_RE = /^\d+d\d+(\+\d+)?$/, PLAIN_DICE_RE = /^\d+d\d+$/;
const ordinal = n => ({1:"1st",2:"2nd",3:"3rd"})[n] || `${n}th`;

let state = { id: null, contents: null, validation: null, dirty: false };
const collapsed = new Set();   // folded sections, remembered across re-renders
const placesCollapsed = new Set();  // place ids whose child-locations are folded in the list
let secCounts = {};            // per-section issue counts from the last validation

// --- helpers ---------------------------------------------------------------
const slugify = s => (String(s).toLowerCase().trim().replace(/[^a-z0-9]+/g, "_")
                        .replace(/^_+|_+$/g, "")) || "thing";
function uniqueId(base, existing) {
  if (!existing.has(base)) return base;
  let n = 2; while (existing.has(`${base}_${n}`)) n++; return `${base}_${n}`;
}
const listOf = kind => Array.isArray(state.contents?.[kind]) ? state.contents[kind] : [];
const csv = s => String(s || "").split(",").map(x => x.trim()).filter(Boolean);

function markDirty() {
  state.dirty = true;
  document.getElementById("dirty").style.display = "inline";
  document.getElementById("saveBtn").disabled = false;
  render();
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

// --- worlds list -----------------------------------------------------------
async function loadWorlds() {
  const { packs } = await (await fetch("/api/packs")).json();
  const list = document.getElementById("worldList");
  if (!packs.length) { list.innerHTML = '<div class="nothing">No worlds found yet.</div>'; return; }
  list.innerHTML = packs.map(p => `
    <button class="world${p.id === state.id ? " active" : ""}" data-id="${esc(p.id)}">
      <div class="wname">${esc(p.name)}</div>
      <div class="wmeta"><span>v${esc(p.version || "?")}</span>
        ${p.ok ? `<span class="pill ok">✓ ready</span>${p.warning_count ? `<span class="pill note">♪ ${p.warning_count}</span>` : ""}`
               : `<span class="pill warn">⚠ ${p.issue_count} to fix</span>`}</div>
    </button>`).join("");
  list.querySelectorAll(".world").forEach(b =>
    b.addEventListener("click", () => tryOpenWorld(b.dataset.id)));
}

async function tryOpenWorld(id) {
  if (state.dirty && !confirm("You have unsaved changes. Discard them and open another world?")) return;
  await openWorld(id);
}
async function openWorld(id) {
  const data = await (await fetch(`/api/pack/${encodeURIComponent(id)}`)).json();
  if (data.error) { toast(data.error); return; }
  state = { id, contents: data.contents, validation: data.validation, dirty: false,
            audioFiles: data.audio_files || [], monsterFiles: data.monster_files || [],
            characterFiles: data.character_files || [] };
  document.getElementById("dirty").style.display = "none";
  document.getElementById("saveBtn").disabled = true;
  render(); loadWorlds();
}

// --- friendly one-liners ---------------------------------------------------
function placeName(id) {
  const p = listOf("places").find(x => x.id === id);
  return p ? p.name : id;
}
// A <select>'s options for picking an existing thing of `kind` by friendly name.
function optionList(kind, selected, noneLabel) {
  const none = noneLabel != null ? `<option value="">${esc(noneLabel)}</option>` : "";
  return none + listOf(kind).map(e =>
    `<option value="${esc(e.id)}"${e.id === selected ? " selected" : ""}>${esc(e.name || e.id)}</option>`).join("");
}
// Coin amounts. A plain number means GOLD (historical pack meaning); a string
// names its coins — "5 sp", "1 gp 5 sp", "2 platinum". Keep this grammar in
// step with oubliette/coin.py parse_coin (the engine-side parser).
const COIN_PART = /(\d[\d,]*)\s*(pp|gp|ep|sp|cp|platinum|gold|electrum|silver|copper)\b/gi;
function coinValid(raw) {
  const s = String(raw).trim();
  if (!s) return false;
  if (/^\d[\d,]*$/.test(s)) return true;                    // bare number = gold
  let matched = 0;
  const leftovers = s.replace(COIN_PART, () => { matched++; return ""; })
    .replace(/pieces?/gi, "").replace(/\band\b/gi, "").replace(/[ ,;]/g, "");
  return matched > 0 && !leftovers;
}
// Field text -> the authored value: "" stays empty, a bare number becomes an int
// (so packs keep plain gold ints), anything else rides as its denominated string.
function coinFromField(raw) {
  const s = String(raw).trim();
  if (!s) return "";
  return /^\d[\d,]*$/.test(s) ? Number(s.replace(/,/g, "")) : s;
}
function coinLabel(v) { return typeof v === "number" ? `${v} gp` : v; }
const COIN_HINT = "a number means gold; write “5 sp” or “1 gp 5 sp” for smaller coin";
// Merchant rows fold inventory + price_list together: one row per held item, with
// an optional price (set = for sale). This makes "you can't price what you don't
// stock" impossible to violate.
function buildInvRows(npc) {
  const pl = (npc && npc.price_list) || {};
  return ((npc && npc.inventory) || []).map(e =>
    ({ item: e.item, qty: e.qty || 1, price: (e.item in pl) ? pl[e.item] : "" }));
}
function describe(kind, e) {
  if (kind === "items") {
    const bits = [e.category];
    if (e.item_type && e.item_type !== "mundane")
      bits.unshift("✦ " + [e.rarity, e.item_type].filter(Boolean).join(" "));
    if (e.base_value != null) bits.push(`worth ~${coinLabel(e.base_value)}`);
    if (e.armor) bits.push(`armor ${e.armor.base_ac}`);
    if (e.weapon) bits.push(`weapon ${e.weapon.damage}`);
    return bits.filter(Boolean).join(" · ") + (e.description ? ` — ${e.description}` : "");
  }
  if (kind === "statblocks") {
    const prof = e.ai_profile ? ` · ${describeProfileRef(e.ai_profile)}` : "";
    const crLab = e.cr == null ? "" : (CR_LABEL[String(e.cr)] || String(e.cr));
    const idy = [e.size, e.type].filter(Boolean).join(" ");
    const head = [idy, crLab ? `CR ${crLab}` : ""].filter(Boolean).join(" · ");
    const combat = (state.monsterFiles || []).includes(e.id) ? " · ⚔ custom combat" : "";
    return `${head ? head + " · " : ""}${e.kind} · ${e.hp} HP · defense ${e.armor_class} · worth ${e.xp} XP${prof}${combat}`;
  }
  if (kind === "ai_profiles") {
    const brave = e.aggression >= 1.5 ? "reckless" : e.will_flee ? "flees when hurt" : e.aggression <= 0.85 ? "cautious" : "steady";
    const range = e.prefers_melee ? "melee" : "ranged";
    const tgt = e.focuses_spellcasters ? "hunts casters" : `targets ${e.target_priority || "nearest"}`;
    return `${brave} · ${range} · ${tgt}${e.protects_allies ? " · guards allies" : ""}`;
  }
  if (kind === "npcs") {
    const where = e.home_location ? ` · lives at ${placeName(e.home_location)}` : "";
    const shop = e.price_list && Object.keys(e.price_list).length ? ` · sells ${Object.keys(e.price_list).length} item(s)` : "";
    return `${e.role || "person"}${where}${shop}${e.disposition ? ` — ${e.disposition}` : ""}`;
  }
  if (kind === "places") {
    const inside = e.parent ? `in ${placeName(e.parent)} · ` : "";
    const exits = (e.exits || []).map(x => x.label || placeName(x.to)).join(", ");
    const snd = (e.sounds || []).length;
    return inside + (e.description || "") + (exits ? `  ↪ exits: ${exits}` : "") + (snd ? `  · ♪ ${snd}` : "");
  }
  if (kind === "scenarios") {
    const party = (e.default_party || []).length;
    return `starts at ${placeName(e.start_location)}${party ? ` · ${party} starting hero(es)` : ""}`;
  }
  if (kind === "lore") {
    const about = (e.subjects || []).length ? `about ${(e.subjects || []).join(", ")} — ` : "";
    const body = (e.text || "").replace(/\s+/g, " ");
    return about + (body.length > 120 ? body.slice(0, 120) + "…" : body);
  }
  if (kind === "factions") {
    const bits = [`starts ${tierForScore(e.default_standing).toLowerCase()} to the party`];
    bits.push(e.known_from_start ? "known from the start" : "hidden until met");
    const members = listOf("npcs").filter(n => n.faction === e.id).length
                  + listOf("statblocks").filter(s => s.faction === e.id).length;
    if (members) bits.push(`${members} member(s)`);
    return bits.join(" · ") + (e.description ? ` — ${e.description}` : "");
  }
  if (kind === "events") {
    const when = e.every_days
      ? (e.on_day ? `day ${e.on_day}, then every ${e.every_days} day(s)` : `every ${e.every_days} day(s)`)
      : `day ${e.on_day}`;
    const bits = [when];
    if (e.place) bits.push(`at ${placeName(e.place)}`);
    if ((e.standing || []).length) bits.push("shifts standing");
    if (e.encounter) bits.push("arms a fight");
    if (e.unlock_quest) bits.push("opens a quest");
    if (e.retire_quest) bits.push("closes a quest");
    if (e.environment) bits.push("turns the sky");
    return bits.join(" · ") + (e.announce ? ` — ${e.announce}` : "");
  }
  if (kind === "backgrounds") {
    const bits = [];
    if ((e.skill_proficiencies || []).length) bits.push(e.skill_proficiencies.join(", ").replace(/_/g, " "));
    if (e.languages) bits.push(`${e.languages} language(s)`);
    if (e.starting_gold) bits.push(`${e.starting_gold}g`);
    if ((e.equipment || []).length) bits.push(`${e.equipment.length} item grant(s)`);
    if (e.feature && e.feature.name) bits.push(`feature: ${e.feature.name}`);
    return bits.join(" · ");
  }
  if (kind === "spells") {
    const ch = e.chassis || {};
    const lvl = e.level === 0 ? "cantrip" : `level ${e.level}`;
    const what = ch.kind === "bolt" ? `bolt · ${ch.damage} ${ch.damage_type}`
               : ch.kind === "blast" ? `blast · ${ch.size_ft}-ft ${ch.shape} · ${ch.damage} ${ch.damage_type}`
               : ch.kind === "heal" ? `heal · ${ch.healing} + mod`
               : ch.kind === "hex" ? `hex · ${(ch.conditions || []).join(", ")}`
               : "";
    const who = (e.classes || []).join(", ");
    return [lvl, e.school, what, who && `for ${who}`].filter(Boolean).join(" · ");
  }
  if (kind === "quests") {
    const src = e.giver_npc ? `given by ${npcName(e.giver_npc)}`
              : e.giver_place ? `found at ${placeName(e.giver_place)}` : "no source set";
    const bits = [src];
    if (e.root) bits.push("starting quest");
    if (e.chain) bits.push(`arc: ${e.chain}`);
    if ((e.branches || []).length) bits.push(`${e.branches.length} outcome(s)`);
    return bits.join(" · ") + (e.hook ? ` — ${e.hook}` : "");
  }
  return "";
}
function npcName(id) {
  const n = listOf("npcs").find(x => x.id === id);
  return n ? n.name : id;
}

// --- render ----------------------------------------------------------------
function statusBanner() {
  if (state.dirty)
    return `<div class="status dirty"><div class="stitle">● Unsaved changes — click “Save world” to write them and re-check.</div></div>`;
  const v = state.validation;
  if (!v) return "";
  let html = "";
  if (v.ok) html += `<div class="status ok"><div class="stitle">✓ Ready to play</div></div>`;
  else {
    const msgs = (v.friendly && v.friendly.length) ? v.friendly.map(f => f.message) : v.issues;
    html += `<div class="status warn">
      <div class="stitle">⚠ ${msgs.length} thing(s) to fix before this world will load</div>
      <ul>${msgs.map(m => `<li>${esc(m)}</li>`).join("")}</ul></div>`;
  }
  const w = v.warnings || [];
  if (w.length) html += `<div class="status note">
      <div class="stitle">♪ ${w.length} sound warning(s) — these won’t stop the world from loading</div>
      <ul>${w.map(x => `<li>${esc(x.message)}</li>`).join("")}</ul></div>`;
  return html;
}
// --- world details (manifest-level: the cover page players see) ------------
function worldDetailsPanel(m) {
  return `<div class="group">
    <div class="ghead"><span class="gtoggle" style="cursor:default"><h3>World details</h3></span></div>
    <div class="gcards" style="display:block; padding:10px 14px">
      <div class="help" style="margin-bottom:8px">The world's cover page — the name, author, and description players see when picking a world. The folder id (<b>${esc(m.id || state.id)}</b>) is fixed.</div>
      <div style="display:flex; gap:12px; flex-wrap:wrap">
        <div class="field" style="flex:2; min-width:180px"><label>Name</label>
          <input id="wd-name" value="${esc(m.name || "")}"></div>
        <div class="field" style="flex:2; min-width:160px"><label>Author</label>
          <input id="wd-author" value="${esc(m.author || "")}"></div>
        <div class="field" style="flex:1; min-width:100px"><label>Version</label>
          <input id="wd-version" value="${esc(m.version || "")}">
          <div class="help">e.g. 1.2.0 — bump when you share a changed world.</div></div>
      </div>
      <div class="field"><label>Description</label>
        <textarea id="wd-desc" rows="2">${esc(m.description || "")}</textarea></div>
    </div>
  </div>`;
}
function wireWorldDetails() {
  const bind = (id, key, after) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => {
      state.contents.pack = state.contents.pack || {};
      state.contents.pack[key] = el.value;
      markDirty();
      if (after) after(el.value);

function wireCharOptions() {
  const box = document.getElementById("co-lists");
  if (!box) return;
  const ensureDeny = () => {
    state.contents.pack = state.contents.pack || {};
    if (!state.contents.pack.chargen_deny)
      state.contents.pack.chargen_deny = { classes: [], races: [], backgrounds: [] };
    return state.contents.pack.chargen_deny;
  };
  const fill = lists => {
    const deny = (state.contents.pack && state.contents.pack.chargen_deny) ||
                 { classes: [], races: [], backgrounds: [] };
    const section = (key, label, opts) => {
      const allowed = opts.filter(o => !(deny[key] || []).includes(o.id)).map(o => o.id);
      return `<div class="field"><label>${label}</label>
        ${checklist(`co-${key}`, opts.map(o => [o.id, o.name]), allowed)}</div>`;
    };
    box.innerHTML = section("classes", "Classes", lists.classes)
      + section("races", "Races", lists.races)
      + section("backgrounds", "Backgrounds", lists.backgrounds);
    ["classes", "races", "backgrounds"].forEach(key => {
      const group = document.getElementById(`co-${key}`);
      if (!group) return;
      group.addEventListener("change", () => {
        const on = new Set(readChecklist(`co-${key}`));
        ensureDeny()[key] = lists[key].filter(o => !on.has(o.id)).map(o => o.id);
        markDirty();
      });
    });
  };
  if (state.chargenLists) { fill(state.chargenLists); return; }
  fetch(`/api/chargen/options?pack=${encodeURIComponent(state.id)}`)
    .then(r => r.json())
    .then(o => {
      const slim = arr => (arr || []).map(x => ({ id: x.id, name: x.name }));
      state.chargenLists = { classes: slim(o.classes), races: slim(o.races),
                             backgrounds: slim(o.backgrounds) };
      fill(state.chargenLists);
    })
    .catch(() => { box.innerHTML = '<div class="help">The option lists didn\'t load — reopen the world to retry.</div>'; });
}

// One card. `i` is the entry's index in listOf(kind) — edit/delete key off it, so it
// must stay the ORIGINAL index even when places are reordered into a hierarchy. `depth`
// indents children under their parent (places only; 0 everywhere else).
function cardHtml(kind, e, i, depth, node) {
  const editable = EDITABLE.has(kind);
  const indent = depth ? ` style="margin-left:${depth * 20}px"` : "";
  // A fold chevron on parent locations (places with children) — collapses the subtree
  // so you don't scroll past one area's children to reach another's.
  const fold = (node && node.hasChildren)
    ? `<button class="pc-fold" data-fold="${esc(e.id)}" title="${node.collapsed ? "Show child locations" : "Hide child locations"}">${node.collapsed ? "▸" : "▾"}</button>`
    : (kind === "places" ? `<span class="pc-fold-spacer"></span>` : "");
  const foldNote = (node && node.hasChildren && node.collapsed)
    ? ` <span class="pc-fold-count">(${node.childCount} inside)</span>` : "";
  return `
    <div class="card${depth ? " card-child" : ""}"${indent}>
      ${fold}
      <div class="cbody">
        <div class="cname">${esc(e.name || e.title || e.id || "(unnamed)")}${foldNote}</div>
        <div class="cline">${esc(describe(kind, e))}</div>
      </div>
      ${editable ? `<div class="cactions">
        ${kind === "statblocks" ? `<button class="btn mini" data-attacks="${i}" title="Attacks, multiattack, special moves & raw data">⚔ Combat</button>` : ""}
        <button class="btn mini" data-edit="${kind}" data-i="${i}">Edit</button>
        <button class="btn mini danger" data-del="${kind}" data-i="${i}">Delete</button></div>` : ""}
    </div>`;
}

// Places ordered as a tree: each top-level location followed by its children (and
// their children) indented beneath it. Returns {e, i, depth, hasChildren, childCount,
// collapsed} keeping the original index. A collapsed parent's descendants are omitted.
// Cycle-safe; places whose parent is missing fall back to the top level.
function placesHierarchy(entries) {
  const byParent = {};
  entries.forEach((e, i) => { const p = e.parent || ""; (byParent[p] = byParent[p] || []).push({ e, i }); });
  const order = [], seen = new Set();
  // Mark a collapsed parent's whole subtree as seen WITHOUT rendering it, so the
  // hidden children aren't mistaken for orphans and re-shown at the bottom.
  const hideSubtree = (key) => (byParent[key] || []).forEach(({ e, i }) => {
    if (seen.has(i)) return;
    seen.add(i); hideSubtree(e.id);
  });
  const walk = (key, depth) => (byParent[key] || []).forEach(({ e, i }) => {
    if (seen.has(i)) return;
    seen.add(i);
    const kids = byParent[e.id] || [];
    const collapsed = placesCollapsed.has(e.id);
    order.push({ e, i, depth, hasChildren: kids.length > 0, childCount: kids.length, collapsed });
    if (kids.length) (collapsed ? hideSubtree(e.id) : walk(e.id, depth + 1));
  });
  walk("", 0);
  entries.forEach((e, i) => {
    if (!seen.has(i)) order.push({ e, i, depth: 0, hasChildren: false, childCount: 0, collapsed: false });
  });  // orphan parent ref
  return order;
}

function renderGroup(kind) {
  const entries = listOf(kind);
  const editable = EDITABLE.has(kind);
  let cards;
  if (!entries.length) cards = '<div class="nothing">None yet.</div>';
  else if (kind === "places")
    cards = placesHierarchy(entries).map(n => cardHtml(kind, n.e, n.i, n.depth, n)).join("");
  else
    cards = entries.map((e, i) => cardHtml(kind, e, i, 0)).join("");
  const warn = secCounts[kind] ? `<span class="sec-warn">⚠ ${secCounts[kind]}</span>` : "";
  const head = `<div class="ghead">
      <span class="gtoggle" data-toggle="${kind}">
        <span class="chev">▾</span><h3>${TITLES[kind]}</h3>
        <span class="count">(${entries.length})</span>${warn}
      </span><span class="gspacer"></span>
      ${editable ? `${kind === "statblocks" ? `<button class="btn mini" data-clone-src="1">Start from existing…</button>` : ""}<button class="btn mini" data-add="${kind}">+ Add ${SINGULAR[kind]}</button>`
                 : `<span class="readonly-note">editing coming soon</span>`}</div>`;
  return `<div class="group${collapsed.has(kind) ? " collapsed" : ""}">${head}<div class="gcards">${cards}</div></div>`;
}
function render() {
  const d = document.getElementById("detail");
  document.getElementById("mapBtn").disabled = !state.contents;
  document.getElementById("exportBtn").disabled = !state.contents;
  if (!state.contents) { d.innerHTML = '<div class="empty">Pick a world on the left to open it.</div>'; return; }
  // Per-section warning counts from the last validation (hidden while dirty — the
  // report is stale until the next save re-checks).
  secCounts = {};
  if (!state.dirty && state.validation && state.validation.friendly)
    state.validation.friendly.forEach(f => { if (f.section) secCounts[f.section] = (secCounts[f.section] || 0) + 1; });
  const m = state.contents.pack || {};
  d.innerHTML = `<h2>${esc(m.name || state.id)}</h2>
    <div class="sub">${esc(m.description || "")}${m.author ? ` · by ${esc(m.author)}` : ""} · v${esc(m.version || "?")}</div>
    ${statusBanner()}${worldDetailsPanel(m)}${worldSettingsPanel(m)}${charOptionsPanel(m)}${ORDER.map(renderGroup).join("")}`;
  wireWorldSettings();
  d.querySelectorAll("[data-edit]").forEach(b =>
    b.addEventListener("click", () => openEditor(b.dataset.edit, +b.dataset.i)));
  d.querySelectorAll("[data-del]").forEach(b =>
    b.addEventListener("click", () => deleteEntry(b.dataset.del, +b.dataset.i)));
  d.querySelectorAll("[data-fold]").forEach(b =>
    b.addEventListener("click", () => {
      const id = b.dataset.fold;
      placesCollapsed.has(id) ? placesCollapsed.delete(id) : placesCollapsed.add(id);
      render();
    }));
  d.querySelectorAll("[data-add]").forEach(b =>
    b.addEventListener("click", () => openEditor(b.dataset.add, null)));
  d.querySelectorAll("[data-clone-src]").forEach(b =>
    b.addEventListener("click", openClonePicker));
  d.querySelectorAll("[data-attacks]").forEach(b =>
    b.addEventListener("click", () => openAttacksEditor(+b.dataset.attacks)));
  d.querySelectorAll("[data-toggle]").forEach(t =>
    t.addEventListener("click", () => {
      const kind = t.dataset.toggle;
      collapsed.has(kind) ? collapsed.delete(kind) : collapsed.add(kind);
      t.closest(".group").classList.toggle("collapsed");   // fold in place, no scroll jump
    }));
}

function deleteEntry(kind, i) {
  const e = listOf(kind)[i];
  if (!confirm(`Delete “${e.name || e.title || e.id}”? (You can still undo by not saving.)`)) return;
  state.contents[kind].splice(i, 1);
  markDirty();
}

// --- the modal editor ------------------------------------------------------
let editorCtx = null;   // { kind, index, exits } while a modal is open
let npcLink = null;      // an npc id awaiting the creature stat block it's authoring (Phase 4a)

function openEditor(kind, index) {
  const original = index != null ? listOf(kind)[index] : null;
  editorCtx = { kind, index };
  if (kind === "places") {
    editorCtx.exits = ((original?.exits) || []).map(x => ({ ...x }));
    editorCtx.image = original?.image || null;
    editorCtx.sounds = ((original?.sounds) || []).map(c => ({ ...c }));
    editorCtx.battle = original?.battle ? JSON.parse(JSON.stringify(original.battle)) : null;
    editorCtx.encounters = ((original?.encounters) || []).map(e => JSON.parse(JSON.stringify(e)));
  }
  if (kind === "statblocks") {
    editorCtx.loot = ((original?.loot) || []).filter(l => l.item).map(l => ({ item: l.item, qty: l.qty || 1 }));
    editorCtx.growth = ((original?.growth) || []).map(g => ({ to: g.to, at_party_level: g.at_party_level || 1 }));
    editorCtx.statblockId = original?.id || null;
  }
  if (kind === "npcs") { editorCtx.inv = buildInvRows(original); editorCtx.original = original; editorCtx.statBlockSel = original?.stat_block || ""; }
  if (kind === "quests") {
    editorCtx.branches = ((original?.branches) || []).map(b => ({ ...b }));
    editorCtx.trinkets = ((original?.trinkets) || []).map(t => ({ ...t }));
    editorCtx.qstanding = ((original?.standing) || []).map(s => ({ ...s }));
  }
  if (kind === "events") editorCtx.evs = ((original?.standing) || []).map(s => ({ ...s }));
  if (kind === "backgrounds") editorCtx.bgeq = ((original?.equipment) || []).map(g => ({ item: g.item, qty: g.qty || 1 }));

  const FORMS = { items: itemForm, statblocks: statblockForm, npcs: npcForm, places: placeForm, lore: loreForm, quests: questForm, factions: factionForm, events: eventForm, scenarios: scenarioForm, ai_profiles: aiProfileForm, backgrounds: backgroundForm, spells: spellForm };
  const WIRES = { statblocks: wireStatblockForm, npcs: wireNpcForm, places: wirePlaceForm, items: wireItemForm, quests: wireQuestForm, events: wireEventForm, ai_profiles: wireAiProfileForm, backgrounds: wireBackgroundForm, spells: wireSpellForm };
  const CONFIRMS = { items: confirmItem, statblocks: confirmStatblock, npcs: confirmNpc, places: confirmPlace, lore: confirmLore, quests: confirmQuest, factions: confirmFaction, events: confirmEvent, scenarios: confirmScenario, ai_profiles: confirmAiProfile, backgrounds: confirmBackground, spells: confirmSpell };

  const modal = document.getElementById("modal");
  modal.innerHTML = FORMS[kind](original);
  document.getElementById("scrim").classList.add("open");
  if (WIRES[kind]) WIRES[kind](original);
  modal.querySelector("[data-cancel]").addEventListener("click", closeEditor);
  modal.querySelector("[data-confirm]").addEventListener("click", () => CONFIRMS[kind](original));
}
function closeEditor() {
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("modal").classList.remove("cg-modal");   // reset the wide chargen layout
  editorCtx = null;
  npcLink = null;          // a cancelled creature hop must not mis-link the next stat block
  editorCrumb = null;      // ...and its breadcrumb goes with it
}

function field(label, inner, help) {
  return `<div class="field"><label>${label}</label>${inner}${help ? `<div class="help">${help}</div>` : ""}</div>`;
}
// A required field's label — the * warns BEFORE save, not only after a failed one.
function req(label) { return `${label}<span class="req">*</span>`; }
// Per-field validation (Stage 3): flag the offending input where the author is
// looking — red border + message under the field — instead of only a line lost at
// the modal footer. Reveals the tab pane holding the field, scrolls to it, and
// clears itself on the next keystroke. Falls back to the footer if the id is odd.
function fieldInvalid(id, msg) {
  const err = gid("f_err"); if (err) err.textContent = "";
  const inp = gid(id);
  if (!inp) { if (err) err.textContent = msg; return; }
  inp.classList.add("bad");
  const home = inp.closest(".field") || inp.parentElement;
  let fe = home.querySelector(".ferr");
  if (!fe) { fe = document.createElement("div"); fe.className = "ferr"; home.appendChild(fe); }
  fe.textContent = msg;
  inp.addEventListener("input", function h() {
    inp.classList.remove("bad"); fe.textContent = ""; inp.removeEventListener("input", h); });
  const pane = inp.closest(".mtab-pane");
  if (pane && !pane.classList.contains("on")) showTab(pane.dataset.pane);
  inp.scrollIntoView({ block: "center", behavior: "smooth" });
  inp.focus({ preventScroll: true });
}
// Mark every row-select in a repeating list (exits, belongings, cues, branches)
// that's missing its pick — pairs with the footer message for row-level errors.
function markEmptyRows(attr) {
  document.querySelectorAll(`[${attr}]`).forEach(s => { if (!s.value) s.classList.add("bad"); });
}
function showTab(name) {
  document.querySelectorAll("#modal .mtab").forEach(b => b.classList.toggle("on", b.dataset.tab === name));
  document.querySelectorAll("#modal .mtab-pane").forEach(p => p.classList.toggle("on", p.dataset.pane === name));
}

// (an NPC's creature form, a clone pick for an NPC), say so at the top so the
// author never wonders where Cancel will land them. Cleared with the editor.
let editorCrumb = null;

function wireItemForm() {
  const sync = () => {
    const t = document.getElementById("f_itype").value;
    const catSel = document.getElementById("f_cat");
    // a potion/scroll must be category "consumable" (schema rule — it gets used up),
    // so lock the Kind dropdown rather than let the save bounce.
    const locked = t === "potion" || t === "scroll";
    if (locked) catSel.value = "consumable";
    catSel.disabled = locked;
    document.getElementById("catLock").style.display = locked ? "inline" : "none";
    const c = catSel.value;
    document.getElementById("armorBox").style.display = c === "armor" ? "block" : "none";
    document.getElementById("weaponBox").style.display = c === "weapon" ? "block" : "none";
    // +N / worn grants only mean something on worn/wielded families (schema rule)
    document.getElementById("bonusBox").style.display = MAGIC_EQUIPPABLE.has(t) ? "block" : "none";
    document.getElementById("wornGrantsBox").style.display = MAGIC_EQUIPPABLE.has(t) ? "block" : "none";
    document.getElementById("consumBox").style.display = c === "consumable" && t !== "poison" ? "block" : "none";
    document.getElementById("poisonBox").style.display = t === "poison" ? "block" : "none";
  };
  document.getElementById("f_cat").addEventListener("change", sync);
  document.getElementById("f_itype").addEventListener("change", sync);
  sync();
}
function confirmItem(original) {
  const name = document.getElementById("f_name").value.trim();
  if (!name) { fieldInvalid("f_name", "Please give it a name."); return; }
  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("items").map(x => x.id)));
  base.name = name;
  base.category = document.getElementById("f_cat").value;

  const setOrDel = (key, val) => { if (val === "" || val == null || (Array.isArray(val) && !val.length)) delete base[key]; else base[key] = val; };
  const worth = document.getElementById("f_value").value;
  if (worth.trim() && !coinValid(worth)) {
    fieldInvalid("f_value", "Write a number of gold (3) or name the coins (“5 sp”, “1 gp 5 sp”)."); return; }
  setOrDel("base_value", coinFromField(worth));
  setOrDel("description", document.getElementById("f_desc").value.trim());
  setOrDel("slot", document.getElementById("f_slot").value);
  setOrDel("tags", csv(document.getElementById("f_tags").value));

  delete base.armor; delete base.weapon;
  if (base.category === "armor")
    base.armor = { base_ac: Number(document.getElementById("f_ac").value || 0),
                   type: document.getElementById("f_atype").value, dex_cap: original?.armor?.dex_cap ?? null };
  if (base.category === "weapon") {
    const w = { attack_bonus: Number(document.getElementById("f_atk").value || 0),
                damage: document.getElementById("f_dmg").value.trim() || "1d4" };
    const props = csv(document.getElementById("f_props").value);
    if (props.length) w.properties = props;
    base.weapon = w;
  }

  // --- magic-item contract: family / rarity / bonus / attunement --------------
  const itype = document.getElementById("f_itype").value;
  if (itype === "mundane") delete base.item_type; else base.item_type = itype;
  setOrDel("rarity", document.getElementById("f_rarity").value);
  if (document.getElementById("f_attune").checked) base.requires_attunement = true;
  else delete base.requires_attunement;
  delete base.magic_bonus; delete base.grants_resistances; delete base.grants_immunities;
  if (MAGIC_EQUIPPABLE.has(itype)) {                 // schema: +N / worn grants need an equippable family
    const mb = document.getElementById("f_mbonus").value;
    if (mb !== "") base.magic_bonus = Number(mb);
    const gres = csv(document.getElementById("f_gres").value);
    if (gres.length) base.grants_resistances = gres;
    const gimm = csv(document.getElementById("f_gimm").value);
    if (gimm.length) base.grants_immunities = gimm;
  }
  if (itype === "potion" || itype === "scroll") base.category = "consumable";  // schema rule (the form locks this too)

  // Mechanics payload: at most one of consumable/poison; `mechanics` is DERIVED —
  // structured iff a payload survived (empty consumable form = prose-only item).
  delete base.consumable; delete base.poison; delete base.mechanics;
  if (itype === "poison") {
    const p = { poison_type: document.getElementById("f_ps_type").value,
                save_dc: Number(document.getElementById("f_ps_dc").value || 10) };
    const sa = document.getElementById("f_ps_save").value;
    if (sa !== "con") p.save_ability = sa;
    const pdmg = document.getElementById("f_ps_dmg").value.trim();
    if (pdmg) p.damage = pdmg;
    const pdt = document.getElementById("f_ps_dtype").value.trim();
    if (pdt && pdt !== "poison") p.damage_type = pdt;
    const conds = csv(document.getElementById("f_ps_conds").value);
    if (conds.length) p.conditions = conds;
    const pdur = document.getElementById("f_ps_dur").value.trim();
    if (pdur) p.duration = pdur;
    base.poison = p;
  } else if (base.category === "consumable") {
    const cn = {};
    const heal = document.getElementById("f_cn_heal").value.trim();
    if (heal) cn.healing = heal;
    const ab = document.getElementById("f_cn_ab").value;
    const abv = document.getElementById("f_cn_abv").value;
    if (ab && abv !== "") cn.ability_set = { [ab]: Number(abv) };
    const resist = document.getElementById("f_cn_resist").value.trim();
    if (resist) cn.grants_resistance = resist;
    const lvl = document.getElementById("f_cn_lvl").value;
    if (lvl !== "") cn.casts_spell_level = Number(lvl);
    const dur = document.getElementById("f_cn_dur").value.trim();
    if (dur) cn.duration = dur;
    if (Object.keys(cn).length) {
      const act = document.getElementById("f_cn_act").value;
      if (act !== "action") cn.action = act;
      base.consumable = cn;
    }
  }
  if (base.consumable || base.poison) base.mechanics = "structured";

  commitEntry("items", original, base);
}

// Starting-kit rows: a pack-item dropdown OR a free-typed id (SRD gear lives
// server-side only, so the id box is the escape hatch — the pack validator
// catches typos). Whichever side was touched last wins; the other clears.
function renderBgEquip() {
  const box = gid("bgEqList");
  const packIds = new Set(listOf("items").map(x => x.id));
  box.innerHTML = editorCtx.bgeq.map((g, i) => {
    const inPack = packIds.has(g.item);
    return `
    <div class="bgeq-row">
      <select data-bgeq-sel="${i}">${optionList("items", inPack ? g.item : "", "(pick a world item)")}</select>
      <input data-bgeq-id="${i}" value="${esc(inPack ? "" : (g.item || ""))}" placeholder="…or an SRD id" />
      <input data-bgeq-qty="${i}" type="number" min="1" value="${g.qty || 1}" />
      <button class="btn mini danger" type="button" data-bgeq-del="${i}">✕</button>
    </div>`;
  }).join("") || '<div class="nothing" style="margin:6px 0">No starting items.</div>';
  box.querySelectorAll("[data-bgeq-sel]").forEach(s => s.addEventListener("change", e => {
    const i = +e.target.dataset.bgeqSel;
    editorCtx.bgeq[i].item = e.target.value;
    box.querySelector(`[data-bgeq-id="${i}"]`).value = "";
  }));
  box.querySelectorAll("[data-bgeq-id]").forEach(inp => inp.addEventListener("input", e => {
    const i = +e.target.dataset.bgeqId;
    editorCtx.bgeq[i].item = e.target.value.trim();
    box.querySelector(`[data-bgeq-sel="${i}"]`).value = "";
  }));
  box.querySelectorAll("[data-bgeq-qty]").forEach(inp => inp.addEventListener("input", e =>
    editorCtx.bgeq[+e.target.dataset.bgeqQty].qty = Number(e.target.value || 1)));
  box.querySelectorAll("[data-bgeq-del]").forEach(b => b.addEventListener("click", e => {
    editorCtx.bgeq.splice(+e.target.dataset.bgeqDel, 1); renderBgEquip(); }));
}
function wireBackgroundForm() {
  renderBgEquip();
  gid("addBgEq").addEventListener("click", () => { editorCtx.bgeq.push({ item: "", qty: 1 }); renderBgEquip(); });
}
function confirmBackground(original) {
  const name = gid("f_name").value.trim();
  if (!name) { fieldInvalid("f_name", "Please give it a name."); return; }
  const fname = gid("f_bg_fname").value.trim();
  const ftext = gid("f_bg_ftext").value.trim();
  if (ftext && !fname) { fieldInvalid("f_bg_fname", "Give the feature a name."); return; }
  const base = original ? { ...original } : {};
  if (!base.id) {
    // "acolyte" is reserved: the loader refuses ids that shadow an SRD background
    const taken = new Set(listOf("backgrounds").map(x => x.id)); taken.add("acolyte");
    base.id = uniqueId(slugify(name), taken);
  }
  base.name = name;
  const setOrDel = (key, val) => { if (val == null || !val.length) delete base[key]; else base[key] = val; };
  setOrDel("skill_proficiencies", readChecklist("f_bg_skills"));
  setOrDel("tool_proficiencies", csv(gid("f_bg_tools").value));
  const langs = Number(gid("f_bg_langs").value || 0);
  if (langs > 0) base.languages = langs; else delete base.languages;
  setOrDel("equipment", editorCtx.bgeq.filter(g => g.item).map(g => ({ item: g.item, qty: g.qty || 1 })));
  const gold = Number(gid("f_bg_gold").value || 0);
  if (gold > 0) base.starting_gold = gold; else delete base.starting_gold;
  if (fname) base.feature = { name: fname, level: 1, text: ftext }; else delete base.feature;

  setOrDel("personality_traits", perLine("f_bg_traits"));
  setOrDel("ideals", perLine("f_bg_ideals"));
  setOrDel("bonds", perLine("f_bg_bonds"));
  setOrDel("flaws", perLine("f_bg_flaws"));
  commitEntry("backgrounds", original, base);
}

// The mechanics sentence, worded to match the bridge's projected action text —
// preview and Arena tooltip tell the same story.
function spellMechanicsText(k, f) {
  if (k === "bolt")
    return `Make a ${f.range > 5 ? "ranged" : "melee"} spell attack; on a hit the target takes ${f.dmg} ${f.dtype} damage.`;
  if (k === "blast")
    return `Each creature in a ${f.size}-foot ${f.shape} makes a ${f.save} saving throw, taking ${f.dmg} ${f.dtype} damage on a failure (${f.onsave === "half" ? "half as much" : "none"} on a success).`;
  if (k === "heal")
    return `A creature within range regains ${f.heal} + your spellcasting modifier hit points.`;
  const conds = f.conds.length ? f.conds.join(" and ") : "…";

function readSpellForm() {

    dmg: gid("f_sp_dmg").value.trim(), dtype: gid("f_sp_dtype").value,

function spellRangeText(f) {

function renderSpellPreview() {
  const f = readSpellForm();

  const school = gid("f_sp_school").value;
  const flavor = gid("f_sp_flavor").value.trim();
  const isHex = f.kind === "hex";
  const head = f.level === 0 ? `${school} cantrip` : `${ordinal(f.level)}-level ${school}`;
  const lines = [
    `<b>Casting Time:</b> 1 ${f.act === "bonus_action" ? "bonus action" : "action"}`,
    `<b>Range:</b> ${esc(spellRangeText(f))}`,
    `<b>Duration:</b> ${isHex ? "Concentration, up to 1 minute" : "Instantaneous"}`,
  ];
  let scaling = "";
  if (f.level === 0)
    scaling = "The damage increases by one die at levels 5, 11, and 17.";
  else if ((f.kind === "bolt" || f.kind === "blast") && f.upcast)
    scaling = `Cast with a higher-level slot: +${esc(f.upcast)} damage per slot level above ${ordinal(f.level)}.`;
  else if (f.kind === "heal" && f.upcast)
    scaling = `Cast with a higher-level slot: +${esc(f.upcast)} healing per slot level above ${ordinal(f.level)}.`;
  else if (isHex && f.uptargets > 0)
    scaling = `Cast with a higher-level slot: ${f.uptargets} more target(s) per slot level above ${ordinal(f.level)}.`;

    <div class="spv-mech">${esc(spellMechanicsText(f.kind, f))}</div>

}
function wireSpellForm() {
  const sync = () => {
    const k = gid("f_sp_kind").value;
    const lvlSel = gid("f_sp_level");
    // heals and hexes can't be cantrips (the schema refuses) — steer, don't bounce
    if ((k === "heal" || k === "hex") && lvlSel.value === "0") lvlSel.value = "1";
    [...lvlSel.options].forEach(o => { if (o.value === "0") o.disabled = (k === "heal" || k === "hex"); });
    const lvl = Number(lvlSel.value);
    gid("spDmgRow").style.display = (k === "bolt" || k === "blast") ? "grid" : "none";
    gid("spBlastRow").style.display = k === "blast" ? "grid" : "none";
    gid("spSaveRow").style.display = (k === "blast" || k === "hex") ? "grid" : "none";
    gid("spOnSaveBox").style.display = k === "blast" ? "block" : "none";
    gid("spHealRow").style.display = k === "heal" ? "block" : "none";
    gid("spHexBox").style.display = k === "hex" ? "block" : "none";
    gid("spUpcastDiceBox").style.display = (lvl > 0 && k !== "hex") ? "block" : "none";
    gid("spUpcastTgtBox").style.display = (lvl > 0 && k === "hex") ? "block" : "none";
    renderSpellPreview();
  };
  gid("f_sp_kind").addEventListener("change", sync);
  gid("f_sp_level").addEventListener("change", sync);
  // any keystroke or pick refreshes the card the player would read; the .mbody
  // node is rebuilt for every editor open, so this listener dies with the form
  const body = document.querySelector("#modal .mbody");
  body.addEventListener("input", renderSpellPreview);
  body.addEventListener("change", renderSpellPreview);
  sync();
}
function confirmSpell(original) {
  const name = gid("f_name").value.trim();
  if (!name) { fieldInvalid("f_name", "Please give it a name."); return; }
  const f = readSpellForm();
  if ((f.kind === "bolt" || f.kind === "blast") && !DICE_RE.test(f.dmg)) {
    fieldInvalid("f_sp_dmg", "Damage should be dice like 2d8 or 2d6+1."); return; }
  if (f.kind === "blast" && (!f.size || f.size <= 0)) {
    fieldInvalid("f_sp_size", "Give the area a size in feet."); return; }
  if (f.kind === "heal" && !PLAIN_DICE_RE.test(f.heal)) {
    fieldInvalid("f_sp_heal", "Healing should be plain dice like 1d8."); return; }
  if (f.kind === "hex" && !f.conds.length) {
    fieldInvalid("f_sp_conds", "Pick at least one condition."); return; }
  if (f.level > 0 && f.kind !== "hex" && f.upcast && !PLAIN_DICE_RE.test(f.upcast)) {
    fieldInvalid("f_sp_upcast", "Upcast dice should be plain dice like 1d8."); return; }
  if (f.kind !== "blast" && f.range < 5) {
    fieldInvalid("f_sp_range", "Range must be at least 5 (touch)."); return; }

  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("spells").map(x => x.id)));
  const isHex = f.kind === "hex";
  base.name = name;
  base.level = f.level;
  base.school = gid("f_sp_school").value;
  base.casting_time = f.act === "bonus_action" ? "1 bonus action" : "1 action";
  base.range = spellRangeText(f);
  base.components = "V, S";
  base.duration = isHex ? "Concentration, up to 1 minute" : "Instantaneous";
  if (isHex) base.concentration = true; else delete base.concentration;
  base.classes = readChecklist("f_sp_classes");
  const flavor = gid("f_sp_flavor").value.trim();
  if (flavor) base.description = flavor; else delete base.description;

  const ch = { kind: f.kind, range_ft: f.range };
  if (f.act === "bonus_action") ch.action_type = "bonus_action";
  if (f.kind === "bolt" || f.kind === "blast") {
    ch.damage = f.dmg; ch.damage_type = f.dtype;
    if (f.level > 0 && f.upcast) ch.upcast_dice = f.upcast;
  }
  if (f.kind === "blast") {
    ch.shape = f.shape; ch.size_ft = f.size; ch.save = f.save;
    if (f.onsave !== "half") ch.on_save = f.onsave;
  }
  if (f.kind === "heal") {
    ch.healing = f.heal;
    if (f.level > 0 && f.upcast) ch.upcast_dice = f.upcast;
  }
  if (isHex) {
    ch.save = f.save; ch.conditions = f.conds;
    if (!f.saveEnds) ch.save_ends = false;
    if (f.uptargets > 0) ch.upcast_targets = f.uptargets;
  }
  base.chassis = ch;
  commitEntry("spells", original, base);
}

function resizeToDataUrl(file, maxW) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      const cx = c.getContext("2d");
      cx.fillStyle = "#14110f"; cx.fillRect(0, 0, w, h);   // flatten onto the theme dark
      cx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      resolve(c.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = () => reject(new Error("could not read that image"));
    img.src = URL.createObjectURL(file);
  });
}

    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/image`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: slugify(name) + ".jpg", data: dataUrl }),

    editorCtx.image = res.filename;

  } catch (e) { toast(String(e.message || e)); }
}

const _TIME_ORDER = { any: 0, day: 1, night: 2 };

function inheritedSounds() {

function renderSounds() {

        <select data-cue-cat="${i}"><option value="music"${c.category === "music" ? " selected" : ""}>music</option><option value="sfx"${c.category !== "music" ? " selected" : ""}>sound effect</option></select>

      </div>

        <label class="cue-vol">vol <input type="range" min="0" max="100" data-cue-gain="${i}" value="${Math.round((c.gain != null ? c.gain : 1) * 100)}" /></label>
        ${shot ? `<span class="cue-gap">every <input type="number" min="1" data-cue-min="${i}" value="${c.min_gap ?? 6}" />–<input type="number" min="1" data-cue-max="${i}" value="${c.max_gap ?? 16}" /> s</span>` : ""}
      </div>

        <select data-cue-time="${i}"><option value="any"${(c.time || "any") === "any" ? " selected" : ""}>any time</option><option value="day"${c.time === "day" ? " selected" : ""}>day only</option><option value="night"${c.time === "night" ? " selected" : ""}>night only</option></select>
        <select data-cue-weather="${i}">${["any", "clear", "rain", "storm", "wind"].map(w => `<option value="${w}"${(c.weather || "any") === w ? " selected" : ""}>${w === "any" ? "any weather" : w}</option>`).join("")}</select>

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("could not read that file"));
    r.readAsDataURL(file);
  });
}
async function onUploadAudio(file) {
  const i = _audioUploadIdx; _audioUploadIdx = null;
  const forBattle = _battleAudioUpload; _battleAudioUpload = false;
  try {
    const dataUrl = await fileToDataUrl(file);
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/audio`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: file.name, data: dataUrl }),
    })).json();
    if (res.error) { toast(res.error); return; }
    state.audioFiles = state.audioFiles || [];
    if (!state.audioFiles.includes(res.filename)) { state.audioFiles.push(res.filename); state.audioFiles.sort(); }
    if (forBattle && editorCtx.battle) {
      editorCtx.battle.music_track = res.filename;
      renderBattle();

      if (i != null && editorCtx.sounds[i]) editorCtx.sounds[i].file = res.filename;

function previewCue(i) {

  if (!c || !c.file) { toast("Pick a sound first."); return; }
  if (_preview) { _preview.pause(); _preview = null; }
  _preview = new Audio(`/api/pack/${encodeURIComponent(state.id)}/audio/${encodeURIComponent(c.file)}`);
  _preview.volume = Math.max(0, Math.min(1, c.gain != null ? c.gain : 1));
  _preview.play().catch(e => toast("Couldn't play that sound: " + (e.message || e)));
}
function cleanCue(c) {
  const o = { file: c.file, kind: c.kind || "bed", category: c.category || "sfx" };
  if (c.scope === "passed_down") o.scope = "passed_down";
  if (c.time && c.time !== "any") o.time = c.time;
  if (c.weather && c.weather !== "any") o.weather = c.weather;
  if (c.gain != null && Math.abs(c.gain - 1) > 1e-6) o.gain = Math.round(c.gain * 100) / 100;
  if (o.kind === "oneshot") {
    if (c.min_gap != null) o.min_gap = c.min_gap;
    if (c.max_gap != null) o.max_gap = c.max_gap;
  }

}

function confirmPlace(original) {
  const name = document.getElementById("f_name").value.trim();
  const desc = document.getElementById("f_desc").value.trim();
  const err = document.getElementById("f_err");
  if (!name) { fieldInvalid("f_name", "Please give it a name."); return; }
  if (!desc) { fieldInvalid("f_desc", "Please write a scene description — it's what players read here."); return; }
  const exits = editorCtx.exits.filter(e => e.to);
  if (exits.length !== editorCtx.exits.length) {
    markEmptyRows("data-exit-to");
    err.textContent = "Every exit needs a destination chosen (or remove it)."; return; }
  const sounds = editorCtx.sounds.filter(c => c.file);
  if (sounds.length !== editorCtx.sounds.length) {
    document.getElementById("sndDrawer").open = true;
    markEmptyRows("data-cue-file");
    err.textContent = "Every sound needs a file chosen (or remove it)."; return; }

  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("places").map(x => x.id)));
  base.name = name; base.description = desc;
  const parent = document.getElementById("f_parent").value;
  if (parent) base.parent = parent; else delete base.parent;
  if (editorCtx.image) base.image = editorCtx.image; else delete base.image;
  const tags = csv(document.getElementById("f_tags").value);
  if (tags.length) base.tags = tags; else delete base.tags;
  if (document.getElementById("f_safe").checked) base.safe_haven = true; else delete base.safe_haven;
  if (exits.length) base.exits = exits.map(e => e.label ? { to: e.to, label: e.label } : { to: e.to });
  else delete base.exits;
  if (sounds.length) base.sounds = sounds.map(cleanCue); else delete base.sounds;
  if (editorCtx.battle) base.battle = editorCtx.battle; else delete base.battle;
  // Keyed encounters: drop empty enemy rows; every kept encounter needs at least
  // one enemy. Ids are minted once (encounter-1, -2, …) and never regenerated —
  // an id names the fired-record in existing campaigns.
  const encs = editorCtx.encounters
    .map(en => ({ ...en, enemies: (en.enemies || []).filter(e => (e.ref || "").trim()) }));
  if (encs.some(en => !en.enemies.length)) {
    document.getElementById("encDrawer").open = true;
    err.textContent = "Each keyed encounter needs at least one enemy — pick a creature, or remove the encounter.";
    return;
  }
  if (encs.length) {
    // Never re-mint an id the place had when this editor opened, even if its
    // encounter was deleted this session — a live campaign's fired-record for
    // the old "encounter-1" must not attach to a brand-new fight.
    const used = new Set([...encs.map(e => e.id),
                          ...((original && original.encounters) || []).map(e => e.id)]
                         .filter(Boolean));
    let n = 1;
    base.encounters = encs.map(en => {
      let id = en.id;
      if (!id) { while (used.has(`encounter-${n}`)) n++; id = `encounter-${n}`; used.add(id); }
      const trig = { when: (en.trigger && en.trigger.when) || "every_visit",
                     time_of_day: (en.trigger && en.trigger.time_of_day) || "any" };
      const lvl = parseInt(en.trigger && en.trigger.min_party_level, 10);
      if (lvl >= 1) trig.min_party_level = lvl;
      const out = { id,
                    enemies: en.enemies.map(e => (+e.count > 1 ? { ref: e.ref.trim(), count: +e.count }
                                                               : { ref: e.ref.trim() })),
                    trigger: trig, once: en.once !== false };
      if (en.ambush) out.ambush = true;
      // Allies survive the round-trip (they used to be silently stripped —
      // a hand-authored Seraphel would vanish on any Forge re-save).
      const allies = (en.allies || []).map(a => (a || "").trim()).filter(Boolean);
      if (allies.length) out.allies = allies;
      if ((en.briefing || "").trim()) out.briefing = en.briefing.trim();
      return out;
    });

// A wrapped checkbox group. `options` is a list of "value" strings or [value,label]
// pairs; `selected` pre-checks by case-insensitive value. Read back with readChecklist(groupId).
function checklist(groupId, options, selected) {
  const sel = new Set((selected || []).map(s => String(s).toLowerCase().trim()));
  return `<div class="chk-group" id="${groupId}">${options.map(o => {
    const [val, lab] = Array.isArray(o) ? o : [o, o];
    return `<label class="chk"><input type="checkbox" value="${esc(val)}"${
      sel.has(String(val).toLowerCase()) ? " checked" : ""}>${esc(lab)}</label>`;
  }).join("")}</div>`;
}
const readChecklist = groupId => [...document.querySelectorAll(`#${groupId} input:checked`)].map(i => i.value);
// Languages are stored as ONE comma string; split a free-text "other" remainder
// (anything not in the standard list) back out so it round-trips into its own box.
function splitLanguages(s) {
  const parts = String(s || "").split(",").map(x => x.trim()).filter(Boolean);
  const stdLower = new Set(LANGUAGES.map(l => l.toLowerCase()));
  return { std: parts.filter(p => stdLower.has(p.toLowerCase())),
           other: parts.filter(p => !stdLower.has(p.toLowerCase())).join(", ") };
}

function renderLoot() {

  box.innerHTML = editorCtx.loot.map((l, i) => `
    <div class="loot-row">
      <select data-loot-item="${i}">${optionList("items", l.item, "(choose an item)")}</select>
      <input data-loot-qty="${i}" type="number" min="1" value="${l.qty || 1}" />
      <button class="btn mini danger" type="button" data-loot-del="${i}">✕</button>
    </div>`).join("") || '<div class="nothing" style="margin:6px 0">No item drops.</div>';
  box.querySelectorAll("[data-loot-item]").forEach(s => s.addEventListener("change", e => editorCtx.loot[+e.target.dataset.lootItem].item = e.target.value));
  box.querySelectorAll("[data-loot-qty]").forEach(inp => inp.addEventListener("input", e => editorCtx.loot[+e.target.dataset.lootQty].qty = Number(e.target.value || 1)));
  box.querySelectorAll("[data-loot-del]").forEach(b => b.addEventListener("click", e => { editorCtx.loot.splice(+e.target.dataset.lootDel, 1); renderLoot(); }));
}
