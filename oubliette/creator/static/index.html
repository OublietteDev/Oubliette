// Saves the picked image into the pack's portraits/ folder (keyed by the creature's
// id, or a slug of its name for a not-yet-saved creature) and stores the filename.
// The file IS written to disk on pick (like the map background) — "Save world" then
// records the reference; the silhouette returns if you Remove it.
async function uploadCreaturePortrait(file) {
  const id = (editorCtx && editorCtx.statblockId) || slugify((document.getElementById("f_name").value || "").trim());
  if (!id) { toast("Give the creature a name first, then add a portrait."); return; }
  try {
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/portrait/${encodeURIComponent(id)}`, {
      method: "POST", headers: { "Content-Type": file.type }, body: file })).json();
    if (res.error) { toast(res.error); return; }
    setCreaturePortrait(res.filename);
  } catch (e) { toast(String(e.message || e)); }
}
function setCreaturePortrait(filename) {
  document.getElementById("f_portrait").value = filename || "";
  const img = document.getElementById("f_portrait_img");
  const nm = document.getElementById("f_portrait_name");
  const clearBtn = document.getElementById("f_portrait_clear");
  if (filename) {
    img.src = `/api/pack/${encodeURIComponent(state.id)}/portrait/${encodeURIComponent(filename)}?t=${Date.now()}`;
    img.classList.remove("is-empty"); nm.textContent = filename; clearBtn.style.display = "";
  } else {
    img.removeAttribute("src"); img.classList.add("is-empty");
    nm.textContent = "No portrait — a silhouette is used in play."; clearBtn.style.display = "none";
  }
  // A different image means the old framing is meaningless — start over.
  setTokenFraming(filename ? { zoom: 1, ox: 0, oy: 0, show: true } : { show: false });
}

// ---- token previewer: frame the portrait inside the Arena's round token ----
// The circle mirrors the Arena's math exactly: the art fills the circle by its
// SHORT side (crop-to-fill) times the zoom, centered plus the pan (fractions
// of the diameter). Same numbers in, same crop out.
function setTokenFraming(o) {
  const wrap = document.getElementById("f_frame_wrap");
  if (!wrap) return;
  if (o.show !== undefined) wrap.style.display = o.show ? "" : "none";
  if (o.zoom !== undefined) document.getElementById("f_token_zoom").value = o.zoom;
  if (o.ox !== undefined) document.getElementById("f_token_ox").value = o.ox;
  if (o.oy !== undefined) document.getElementById("f_token_oy").value = o.oy;
  layoutTokenFrame();
}
function layoutTokenFrame() {
  const circle = document.getElementById("f_frame_circle");
  const img = document.getElementById("f_frame_img");
  const src = document.getElementById("f_portrait_img").getAttribute("src");
  if (!circle || !src) return;
  if (img.getAttribute("src") !== src) { img.src = src; }
  if (!img.naturalWidth) { img.onload = layoutTokenFrame; return; }
  const D = circle.clientWidth || 96;
  const zoom = Number(document.getElementById("f_token_zoom").value) || 1;
  const ox = Number(document.getElementById("f_token_ox").value) || 0;
  const oy = Number(document.getElementById("f_token_oy").value) || 0;
  const s = D / Math.min(img.naturalWidth, img.naturalHeight) * zoom;
  const w = img.naturalWidth * s, h = img.naturalHeight * s;
  img.style.width = w + "px"; img.style.height = h + "px";
  img.style.left = ((D - w) / 2 + ox * D) + "px";
  img.style.top = ((D - h) / 2 + oy * D) + "px";
}
function wireTokenFrame() {
  const circle = document.getElementById("f_frame_circle");
  if (!circle) return;
  document.getElementById("f_token_zoom").addEventListener("input", layoutTokenFrame);
  document.getElementById("f_frame_reset").addEventListener("click",
    () => setTokenFraming({ zoom: 1, ox: 0, oy: 0 }));
  let drag = null;
  circle.addEventListener("pointerdown", (e) => {
    drag = { x: e.clientX, y: e.clientY };
    circle.setPointerCapture(e.pointerId);
  });
  circle.addEventListener("pointermove", (e) => {
    if (!drag) return;
    const D = circle.clientWidth || 96;
    const clamp = (n) => Math.max(-1, Math.min(1, n));
    const oxEl = document.getElementById("f_token_ox");
    const oyEl = document.getElementById("f_token_oy");
    oxEl.value = clamp((Number(oxEl.value) || 0) + (e.clientX - drag.x) / D).toFixed(3);
    oyEl.value = clamp((Number(oyEl.value) || 0) + (e.clientY - drag.y) / D).toFixed(3);
    drag = { x: e.clientX, y: e.clientY };
    layoutTokenFrame();
  });
  const end = () => { drag = null; };
  circle.addEventListener("pointerup", end);
  circle.addEventListener("pointercancel", end);
  layoutTokenFrame();
}
function confirmStatblock(original) {
  const name = document.getElementById("f_name").value.trim();
  if (!name) { fieldInvalid("f_name", "Please give it a name."); return null; }
  // CR is required: every creature that can be dragged into a fight needs a
  // challenge rating, or the encounter-difficulty machinery can't budget it.
  const crRaw = document.getElementById("f_cr").value;
  if (crRaw === "") { fieldInvalid("f_cr", "Give it a challenge rating — even harmless townsfolk are CR 0."); return null; }
  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("statblocks").map(x => x.id)));
  base.name = name;
  base.kind = document.getElementById("f_kind").value;
  base.abilities = {};
  ["str","dex","con","int","wis","cha"].forEach(k => base.abilities[k] = Number(document.getElementById("f_ab_" + k).value || 10));
  base.hp = Number(document.getElementById("f_hp").value || 1);
  base.armor_class = Number(document.getElementById("f_ac").value || 10);
  base.attack_bonus = Number(document.getElementById("f_atk").value || 0);
  base.damage = document.getElementById("f_dmg").value.trim() || "1d4";
  base.xp = Number(document.getElementById("f_xp").value || 0);
  // --- identity (3a): set when given, else drop the key to keep packs clean ---
  const setStr = (key, id) => { const t = document.getElementById(id).value.trim(); if (t) base[key] = t; else delete base[key]; };
  setStr("size", "f_size"); setStr("type", "f_type"); setStr("alignment", "f_align");
  setStr("hit_dice", "f_hitdice"); setStr("ac_desc", "f_acdesc"); setStr("portrait", "f_portrait");
  // --- token framing (previewer): written only when adjusted, keeping packs clean ---
  const tZoom = Number(document.getElementById("f_token_zoom").value) || 1;
  const tOx = Number(document.getElementById("f_token_ox").value) || 0;
  const tOy = Number(document.getElementById("f_token_oy").value) || 0;
  if (base.portrait && (tZoom !== 1 || tOx !== 0 || tOy !== 0)) {
    base.token_zoom = tZoom; base.token_offset_x = tOx; base.token_offset_y = tOy;
  } else { delete base.token_zoom; delete base.token_offset_x; delete base.token_offset_y; }
  // languages = ticked standard ones + the free-text "other", joined into one string
  const langs = [...readChecklist("f_langs"), ...csv(document.getElementById("f_langs_other").value)];
  if (langs.length) base.languages = langs.join(", "); else delete base.languages;
  base.cr = Number(crRaw);
  // --- saving throw bonuses: only the abilities the author filled in ---
  const saves = {};
  ["str","dex","con","int","wis","cha"].forEach(k => { const t = document.getElementById("f_sv_" + k).value.trim(); if (t !== "") saves[k] = Number(t); });
  if (Object.keys(saves).length) base.saves = saves; else delete base.saves;
  // --- speed: feet inputs → "{n} ft." strings, only the filled lanes ---
  const speed = {};
  [["walk","f_spd_walk"],["fly","f_spd_fly"],["swim","f_spd_swim"],["climb","f_spd_climb"],["burrow","f_spd_burrow"]].forEach(([k, id]) => {
    const t = document.getElementById(id).value.trim(); if (t !== "") speed[k] = `${Number(t)} ft.`; });
  if (Object.keys(speed).length) base.speed = speed; else delete base.speed;
  // --- senses: darkvision (ft) + passive perception (bare number) ---
  const senses = {};
  const dv = document.getElementById("f_darkvision").value.trim(); if (dv !== "") senses.darkvision = `${Number(dv)} ft.`;
  const pp = document.getElementById("f_passperc").value.trim(); if (pp !== "") senses.passive_perception = String(Number(pp));
  if (Object.keys(senses).length) base.senses = senses; else delete base.senses;
  // --- defenses + skills: ticked from fixed lists (can't be fat-fingered) ---

async function cloneFrom(source) {

      if ((state.monsterFiles || []).includes(source.id)) {
        const data = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/monster/${encodeURIComponent(source.id)}`)).json();

  linkCreatedStatblock(sb.id);                        // link back if cloned from an NPC (Phase 4a)
  markDirty();
  openEditor("statblocks", state.contents.statblocks.length - 1);

  bind("spc-dtype", "dtype", "change"); bind("spc-onsave", "onSave", "change"); bind("spc-freq", "freq", "change");
  bind("spc-when", "useWhen", "change");
  attacksCtx.specials.forEach((s, i) => document.querySelectorAll(`#spc_cond_${i} input`).forEach(cb =>
    cb.addEventListener("change", () => { attacksCtx.specials[i].conds = readChecklist(`spc_cond_${i}`); refresh(i); })));
  box.querySelectorAll("[data-spc-del]").forEach(el =>
    el.addEventListener("click", e => { attacksCtx.specials.splice(+e.target.dataset.spcDel, 1); renderSpecialBlocks(); }));

// Validate the friendly inputs and fold them back into the combat file (in place),
// returning the assembled Monster — or null (with an inline error) if invalid. Shared
// by Save and the "edit raw data" door so both see the same up-to-date combat file.
function _collectMonster() {
  const err = document.getElementById("atk_err"); err.textContent = "";
  if (!attacksCtx.attacks.length) { err.textContent = "Give it at least one attack."; return null; }
  for (const a of attacksCtx.attacks) {
    if (!a.name.trim()) { err.textContent = "Every attack needs a name."; return null; }
    if (!_parseDamage(a.dmg)) { err.textContent = `“${a.name}”: damage must look like 2d6 or 1d8+2.`; return null; }
  }
  for (const s of attacksCtx.specials) {
    if (!s.name.trim()) { err.textContent = "Every special move needs a name."; return null; }
    if (s.dmg && !_parseDamage(s.dmg)) { err.textContent = `“${s.name}”: damage must look like 6d6 or 2d8+1 (or leave it blank).`; return null; }
    if (!s.dmg && !(s.conds || []).length) { err.textContent = `“${s.name}” needs damage, a condition, or both.`; return null; }
  }
  const perTurn = Math.max(1, Math.min(6, Number(document.getElementById("atk_multi").value || 1)));
  const m = attacksCtx.monster;
  m.actions = [...attacksCtx.keep, ...attacksCtx.attacks.map(_attackToAction), ...attacksCtx.specials.map(_specialToAction)];
  m.special_abilities = (m.special_abilities || []).filter(f => f.name !== "Multiattack");
  if (perTurn > 1)
    m.special_abilities.push({ name: "Multiattack",
      description: `The ${attacksCtx.creature.name.toLowerCase()} makes ${_NUMWORD[perTurn] || perTurn} attacks.`,
      extra_attack_count: perTurn });
  return m;
}
async function saveAttacks() {
  const m = _collectMonster();
  if (!m) return;
  const err = document.getElementById("atk_err");
  try {
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/monster/${encodeURIComponent(attacksCtx.creature.id)}`, {
      method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ monster: m }) })).json();
    if (res.error) { err.textContent = res.error; return; }
  } catch (e) { err.textContent = String(e.message || e); return; }
  if (!(state.monsterFiles || []).includes(attacksCtx.creature.id)) (state.monsterFiles = state.monsterFiles || []).push(attacksCtx.creature.id);
  closeEditor();
  render();
  toast(`Saved ${attacksCtx.creature.name}'s attacks.`);
}

const AIP_DEFAULTS = { aggression: 1.0, self_preservation: 1.0, target_priority: "nearest",

           cautious: { aggression: 0.8, self_preservation: 1.2, will_flee: true,  retreat_threshold: 0.35 },

  hunt:  { closest: { target_priority: "nearest", focuses_spellcasters: false },
           weakest: { target_priority: "weakest", focuses_spellcasters: false },
           threat:  { target_priority: "threatening", focuses_spellcasters: false },
           casters: { target_priority: "threatening", focuses_spellcasters: true } },
  fight: { melee:  { prefers_melee: true,  maintains_distance: 0,  avoids_opportunity_attacks: false },

  protect: { no: { protects_allies: false }, yes: { protects_allies: true } },

const AIP_PRESETS = {
  berserker:   { label: "Berserker",  knobs: { aggression: 1.8, self_preservation: 0.3, will_flee: false, retreat_threshold: 0.1 }, easy: { brave: "reckless", hunt: "closest", fight: "melee", protect: "no" } },
  archer:      { label: "Archer",     knobs: { prefers_melee: false, maintains_distance: 60, avoids_opportunity_attacks: true }, easy: { brave: "steady", hunt: "weakest", fight: "ranged", protect: "no" } },
  spellcaster: { label: "Battle-mage", knobs: { aggression: 0.8, prefers_melee: false, maintains_distance: 30, uses_limited_abilities: 0.8, uses_area_attacks: true, focuses_spellcasters: true }, easy: { brave: "cautious", hunt: "casters", fight: "ranged", protect: "no" } },

  protector:   { label: "Bodyguard",  knobs: { aggression: 0.7, protects_allies: true, target_priority: "threatening" }, easy: { brave: "steady", hunt: "threat", fight: "melee", protect: "yes" } },
};
const _AIP_BRAVE = { reckless: "Reckless — charges in", steady: "Steady — fights normally", cautious: "Cautious — hangs back", cowardly: "Cowardly — flees when hurt" };
const _AIP_HUNT = { closest: "Whoever's closest", weakest: "The weakest", threat: "The biggest threat", casters: "Spellcasters first" };

  const b = { berserker: "Berserker (reckless brawler)", archer: "Archer (ranged skirmisher)",
    spellcaster: "Battle-mage (blasts groups)", coward: "Coward (flees when hurt)", protector: "Bodyguard (guards allies)" };

function aipDeriveEasy(v) {
  const g = k => (v[k] != null ? v[k] : AIP_DEFAULTS[k]);
  const agg = g("aggression");
  const brave = agg >= 1.5 ? "reckless"
    : g("will_flee") ? (g("self_preservation") >= 1.4 ? "cowardly" : "cautious")
    : (agg <= 0.85 ? "cautious" : "steady");
  const hunt = g("focuses_spellcasters") ? "casters"
    : ({ nearest: "closest", weakest: "weakest", strongest: "threat", threatening: "threat", random: "closest" }[g("target_priority")] || "closest");
  return { brave, hunt, fight: g("prefers_melee") ? "melee" : "ranged", protect: g("protects_allies") ? "yes" : "no" };
}

function aipApply(obj) {
  for (const k in obj) {
    const el = document.getElementById("f_ap_" + k);
    if (!el) continue;
    if (el.type === "checkbox") el.checked = !!obj[k]; else el.value = obj[k];
  }
}
function wireAiProfileForm() {
  const easy = document.getElementById("ap_easy"), pro = document.getElementById("ap_pro");
  document.querySelectorAll("[data-mode]").forEach(b => b.addEventListener("click", () => {
    const isPro = b.dataset.mode === "pro";
    pro.style.display = isPro ? "" : "none";
    easy.style.display = isPro ? "none" : "";
  }));
  // An easy answer applies its dial-bundle onto the Pro inputs.
  [["brave", "ap_q_brave"], ["hunt", "ap_q_hunt"], ["fight", "ap_q_fight"], ["protect", "ap_q_protect"]].forEach(([axis, id]) =>
    document.getElementById(id).addEventListener("change", e => { if (e.target.value) aipApply(AIP_EASY[axis][e.target.value]); }));
  // A preset fills everything (Pro inputs + the easy answers).
  document.querySelectorAll("[data-preset]").forEach(b => b.addEventListener("click", () => {
    const pr = AIP_PRESETS[b.dataset.preset];
    aipApply({ ...AIP_DEFAULTS, ...pr.knobs });
    for (const axis in pr.easy) { const s = document.getElementById("ap_q_" + axis); if (s) s.value = pr.easy[axis]; }
  }));
}
function confirmAiProfile(original) {
  const name = document.getElementById("f_name").value.trim();
  if (!name) { fieldInvalid("f_name", "Please name this personality."); return; }
  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("ai_profiles").map(x => x.id)));
  base.name = name;
  const num = id => Number(document.getElementById("f_ap_" + id).value);
  const bool = id => document.getElementById("f_ap_" + id).checked;
  base.aggression = num("aggression");
  base.self_preservation = num("self_preservation");
  base.target_priority = document.getElementById("f_ap_target_priority").value;
  base.focuses_spellcasters = bool("focuses_spellcasters");
  base.prefers_melee = bool("prefers_melee");
  base.uses_area_attacks = bool("uses_area_attacks");
  base.maintains_distance = num("maintains_distance");
  base.flanks_when_possible = bool("flanks_when_possible");
  base.avoids_opportunity_attacks = bool("avoids_opportunity_attacks");
  base.protects_allies = bool("protects_allies");
  base.uses_limited_abilities = num("uses_limited_abilities");
  base.retreat_threshold = num("retreat_threshold");
  base.will_flee = bool("will_flee");
  commitEntry("ai_profiles", original, base);
}

  } else {

  }

  const wire = (id, fn) => { const b = document.getElementById(id); if (b) b.addEventListener("click", fn); };
  wire("npcNewCreature", () => npcAuthorCreature("new"));

}
// Build the NPC record from the form, or null (with an inline error) if invalid.
// `forceKind` lets the creature-authoring handoff pin combat_kind="creature".
function npcEntryFromForm(original, forceKind) {
  const name = document.getElementById("f_name").value.trim(), err = document.getElementById("f_err");
  if (!name) { fieldInvalid("f_name", "Please give them a name."); return null; }
  const rows = editorCtx.inv.filter(r => r.item);
  if (rows.length !== editorCtx.inv.length) {
    markEmptyRows("data-inv-item");
    err.textContent = "Every belongings row needs an item chosen (or remove it)."; return null; }
  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("npcs").map(x => x.id)));
  base.name = name;
  const setOrDel = (k, val) => { if (val === "" || val == null) delete base[k]; else base[k] = val; };
  setOrDel("role", document.getElementById("f_role").value.trim());
  setOrDel("disposition", document.getElementById("f_disp").value.trim());
  setOrDel("description", document.getElementById("f_desc").value.trim());
  const facEl = document.getElementById("f_faction");   // rendered only when factions exist
  if (facEl) setOrDel("faction", facEl.value);
  setOrDel("home_location", document.getElementById("f_home").value);
  const kind = forceKind || document.getElementById("f_combat_kind").value || "none";
  const sbEl = document.getElementById("f_sb");
  const sbSel = kind === "person" ? "" : (sbEl ? sbEl.value : (editorCtx.statBlockSel || ""));
  setOrDel("stat_block", sbSel);
  if (kind && kind !== "none") base.combat_kind = kind; else delete base.combat_kind;   // omit default to keep packs clean
  const goldRaw = document.getElementById("f_gold").value;
  if (goldRaw.trim() && !coinValid(goldRaw)) {
    fieldInvalid("f_gold", "Write a number of gold (3) or name the coins (“8 sp”)."); return null; }
  const goldVal = coinFromField(goldRaw);
  if (goldVal) base.gold = goldVal; else delete base.gold;
  const badPrice = rows.find(r => String(r.price ?? "").trim() && !coinValid(r.price));
  if (badPrice) {
    err.textContent = `The price on “${(listOf("items").find(x => x.id === badPrice.item) || {}).name || badPrice.item}” isn't a coin amount — a number means gold, or name the coins (“5 sp”).`;
    return null; }
  const inv = [], prices = {};
  rows.forEach(r => {
    inv.push(r.qty && r.qty !== 1 ? { item: r.item, qty: r.qty } : { item: r.item });
    const p = coinFromField(r.price ?? "");
    if (p !== "") prices[r.item] = p;
  });
  if (inv.length) base.inventory = inv; else delete base.inventory;
  if (Object.keys(prices).length) base.price_list = prices; else delete base.price_list;
  return base;
}
function confirmNpc(original) {

}
// Author this NPC's creature combat: save the character first (so the link

// fresh stat block that links back to the NPC via `npcLink`; "edit" opens the one
// already chosen in the dropdown.
function npcAuthorCreature(mode) {
  const base = npcEntryFromForm(editorCtx.original, "creature");
  if (!base) return;
  if (mode === "edit") {
    const idx = listOf("statblocks").findIndex(s => s.id === base.stat_block);
    if (idx < 0) { toast("Pick a creature first."); return; }
    commitEntry("npcs", editorCtx.original, base);
    toast(`“${base.name}” saved — opening their creature`);
    editorCrumb = `↩ Part of character <b>${esc(base.name)}</b> — you're editing the creature they fight as.`;
    openEditor("statblocks", idx);
    return;
  }
  commitEntry("npcs", editorCtx.original, base);   // closeEditor clears npcLink → set it AFTER
  npcLink = base.id;
  toast(`“${base.name}” saved — opening the creature editor`);
  editorCrumb = `↩ Part of character <b>${esc(base.name)}</b> — this creature will be linked to them.`;
  if (mode === "clone") { openClonePicker(); return; }

}
// A creature minted from within an NPC editor links back to that NPC (Phase 4a).
function linkCreatedStatblock(newId) {
  if (!npcLink) return;
  const npc = (state.contents.npcs || []).find(n => n.id === npcLink);
  if (npc) { npc.stat_block = newId; npc.combat_kind = "creature"; markDirty(); }
  npcLink = null;
}

// Chargen wizard (Phase 4b): build a person-NPC as a real PC-style character
// with the SAME engine the players use. The form collects a CharacterBuild; the
// server (rules.chargen, via /api/chargen/*) owns every number and the firewall —
// the live preview IS the firewall surfaced. On save the built Character snapshot
// is written to the NPC's sidecar (characters/<id>.json), which the loader reads.
// Ported from the play app's wizard, trimmed to one character (no party/level-up).

function el(tag, cls, text) {

function cgInit(name) {

         description: "", personality_traits: [], ideals: [], bonds: [], flaws: [], _pool: [],

function selectRace(id) {

function selectSubrace(id) {

}
function selectClass(id, silent) {

function resetAbilities(method) {
  cg.ability_method = method;
  if (method === "point_buy") {
    cg.base_abilities = {}; cgOpt.abilities.forEach(a => cg.base_abilities[a] = 8);
    cg._pool = [];
  } else if (method === "standard_array") {
    cg._pool = cgOpt.standard_array.slice();
    cg.base_abilities = {};
    cgOpt.abilities.forEach((a, i) => cg.base_abilities[a] = cg._pool[i]);
  } else {  // roll
    cg._pool = []; cg.base_abilities = {};
  }
}
function rollPool() {
  const roll1 = () => { const d = [0,0,0,0].map(() => 1 + Math.floor(Math.random() * 6)).sort((a, b) => b - a); return d[0] + d[1] + d[2]; };
  cg._pool = [0,0,0,0,0,0].map(roll1).sort((a, b) => b - a);
  cg.base_abilities = {};
  cgOpt.abilities.forEach((a, i) => cg.base_abilities[a] = cg._pool[i]);
}
function cgBuild() {
  const b = { ...cg }; delete b._pool; delete b.level; delete b.mode; delete b.levelChoices;
  // a subclass earned after level 1 (e.g. a Fighter's archetype at 3) isn't part of
  // the level-1 build — it's applied during the level walk. Only classes that pick a
  // subclass at level 1 (cleric, sorcerer, warlock) send it with the base build.
  if (cgClass().subclass_level > 1) delete b.subclass;
  return b;
}

function finalAbility(key) {
  let v = cg.base_abilities[key] || 10;
  const r = cgRace(); if (r && r.ability_increases[key]) v += r.ability_increases[key];
  const sr = cgSubrace(); if (sr && sr.ability_increases[key]) v += sr.ability_increases[key];
  if (r && r.ability_score_choices && cg.race_ability_choices.includes(key))

  return v;

function renderRaceAbilityChoices() {
  const r = cgRace(), asc = r.ability_score_choices;

  // automatic (a Half-Elf's CHA +2), and the picks raise OTHER abilities.
  const fixed = Object.entries(r.ability_increases || {})
    .map(([a, n]) => `${a.toUpperCase()} +${n}`).join(", ");
  if (fixed) sec.appendChild(el("div", "cg-hint",
    `${fixed} comes automatically with ${r.name} — your picks here raise ${asc.choose} of the other abilities.`));
  const checks = el("div", "cg-checks");

async function _post(url, body) {
  return (await (await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify(body) })).json());
}
// Default per-level choices for the auto-walk: average HP, the chosen subclass,
// ASI poured into the highest abilities, and the first N required spells. The one
// choice that matters for an NPC (the subclass) is picked in the form; the rest
// are sensible defaults so authoring a level isn't a chore.
function cgAsiDefault(abilities) {
  const order = Object.keys(abilities).sort((a, b) => abilities[b] - abilities[a]);
  const inc = {}; let points = 2;
  for (const a of order) {
    while (points > 0 && (abilities[a] + (inc[a] || 0)) < 20) { inc[a] = (inc[a] || 0) + 1; points--; }
    if (!points) break;
  }
  if (points && order.length) inc[order[0]] = (inc[order[0]] || 0) + points;   // all maxed: dump anywhere
  return inc;
}
function cgDefaultChoice(plan, preview) {
  const choice = { hp_method: "average", hp_roll: null, ability_increases: {}, feat: null,
                   subclass: null, new_cantrips: [], new_spells: [] };
  if (plan.needs_subclass) choice.subclass = cg.subclass || (plan.subclass_options[0] || {}).id || null;
  if (plan.is_asi) choice.ability_increases = cgAsiDefault((preview && preview.abilities) || {});
  const sp = plan.spellcasting;
  if (sp) {
    choice.new_cantrips = (sp.cantrip_options || []).slice(0, sp.cantrips_needed).map(o => o.id);
    choice.new_spells = (sp.spell_options || []).slice(0, sp.spells_needed).map(o => o.id);
  }
  return choice;
}
// Manual choices override the auto defaults where the author set them; anything
// left unset stays auto so the build is always valid.
function mergeChoice(def, stored) {
  if (!stored) return def;
  const c = { ...def };
  if (stored.hp_method) c.hp_method = stored.hp_method;
  if (stored.hp_method === "roll" && stored.hp_roll != null) c.hp_roll = stored.hp_roll;
  if (stored.feat) { c.feat = stored.feat; c.ability_increases = {}; }
  else if (stored.ability_increases && Object.keys(stored.ability_increases).length) {
    c.ability_increases = stored.ability_increases; c.feat = null;
  }
  if (stored.new_cantrips) c.new_cantrips = stored.new_cantrips;
  if (stored.new_spells) c.new_spells = stored.new_spells;
  return c;
}
// Build at level 1, then walk /levelup up to the target level. Returns the final
// {ok, errors, character, preview, plans} — plans (each level's requirements) feed
// the manual-leveling editors. Used by both the live preview and save.
async function cgEvaluate() {
  const base = await _post(cgApi("/api/chargen/build"), cgBuild());
  if (!base.ok) return { ok: false, errors: base.errors, character: null, preview: null, plans: [] };
  let char = base.character, preview = base.preview, level = 1;
  const target = Math.max(1, Math.min(20, cg.level || 1));
  const plans = [];
  while (level < target) {
    const plan = await _post(cgApi("/api/chargen/levelup/plan"), char);
    if (!plan.can_level) return { ok: false, errors: [plan.reason || `can't reach level ${level + 1}`], character: char, preview, plans };
    plans.push({ level: level + 1, plan });
    const def = cgDefaultChoice(plan, preview);
    const choice = cg.mode === "manual" ? mergeChoice(def, cg.levelChoices[level + 1]) : def;
    const up = await _post(cgApi("/api/chargen/levelup"), { character: char, choice });
    if (!up.ok) return { ok: false, errors: up.errors, character: char, preview, plans };
    char = up.character; preview = up.preview; level++;
  }
  return { ok: true, errors: [], character: char, preview, plans };
}
// --- live preview (the firewall, surfaced) ---
let cgLastPlans = [];
function cgPreview() {
  clearTimeout(cgTimer);
  cgTimer = setTimeout(async () => {
    const seq = ++cgSeq;
    let data;
    try { data = await cgEvaluate(); } catch (e) { return; }
    if (seq !== cgSeq) return;            // a newer preview superseded this one
    renderPreview(data);
    if (cg.mode === "manual" && (cg.level || 1) > 1) { cgLastPlans = data.plans || []; fillManualLevels(cgLastPlans); }
  }, 250);
}
// Re-render the manual editors immediately from the cached plans (so toggles feel
// instant), then kick a fresh walk (later levels can depend on this choice).
function refreshLevels() { if (gid("cg-levels")) fillManualLevels(cgLastPlans); cgPreview(); }

function fillManualLevels(plans) {
  const box = gid("cg-levels"); if (!box) return;
  box.innerHTML = "";

  plans.forEach(({ level, plan }) => box.appendChild(renderLevelChoice(level, plan)));

function renderLevelChoice(level, plan) {

function renderAsiChoice(stored, plan) {
  const wrap = el("div");
  const inc = stored.ability_increases || {};
  const mode = stored.feat ? "feat" : (Object.values(inc).some(v => v === 2) ? "one" : (Object.keys(inc).length >= 2 ? "two" : "one"));
  wrap.appendChild(selectField("Ability Score Improvement",
    mode,
    [{ value: "one", label: "+2 to one ability" }, { value: "two", label: "+1 to two abilities" }, { value: "feat", label: "Take a feat" }],
    v => {
      if (v === "feat") { stored.feat = (plan.feats[0] || {}).id || null; stored.ability_increases = {}; }
      else if (v === "two") { stored.feat = null; stored.ability_increases = {}; }
      else { stored.feat = null; stored.ability_increases = {}; }
      refreshLevels();
    }));
  const abilOpts = cgOpt.abilities.map(a => ({ value: a, label: a.toUpperCase() }));
  if (mode === "feat") {
    wrap.appendChild(selectField("Feat", stored.feat || (plan.feats[0] || {}).id || "",
      (plan.feats || []).map(f => ({ value: f.id, label: f.name })),
      v => { stored.feat = v; cgPreview(); }));
  } else if (mode === "one") {
    const cur = Object.keys(inc)[0] || cgOpt.abilities[0];
    wrap.appendChild(selectField("+2 to", cur, abilOpts,
      v => { stored.ability_increases = { [v]: 2 }; stored.feat = null; cgPreview(); }));
  } else {
    const keys = Object.keys(inc); const a1 = keys[0] || cgOpt.abilities[0], a2 = keys[1] || cgOpt.abilities[1];
    const setTwo = (x, y) => { stored.ability_increases = x === y ? { [x]: 2 } : { [x]: 1, [y]: 1 }; stored.feat = null; cgPreview(); };
    const row = el("div", "cg-row");
    row.appendChild(selectField("+1 to", a1, abilOpts, v => setTwo(v, a2)));
    row.appendChild(selectField("and +1 to", a2, abilOpts, v => setTwo(a1, v)));
    wrap.appendChild(row);
  }
  return wrap;
}
function renderLevelSpells(stored, sp) {

    const row = el("div", "cg-checks");

function renderPreview(data) {

// Render a derived sheet (build preview or a stored character's review) into `root`.
function renderSheetCard(root, p, label) {
  const d = p.derived;
  root.appendChild(el("h3", null, p.name || "Unnamed"));
  root.appendChild(el("div", "cg-sub", label));
  const stats = el("div", "cg-stats");
  const stat = (lbl, val) => { const s = el("div", "cg-stat"); s.appendChild(el("b", null, String(val))); s.appendChild(el("span", null, lbl)); return s; };
  stats.appendChild(stat("AC", d.armor_class));
  stats.appendChild(stat("HP", p.max_hp));
  stats.appendChild(stat("Speed", p.speed));
  stats.appendChild(stat("Init", signed(d.initiative)));
  stats.appendChild(stat("Prof", signed(d.proficiency_bonus)));
  if (d.spell_save_dc != null) stats.appendChild(stat("Spell DC", d.spell_save_dc));
  root.appendChild(stats);
  const abils = el("div", "cg-abils");

async function openSheetView(npcId) {

  const className = ((cgOpt.classes || []).find(x => x.id === sh.char_class) || {}).name || sh.char_class || "—";

async function cgSaveCharacter() {
  const built = await cgEvaluate();      // build + walk to the target level
  if (!built.ok) { toast("Couldn't build: " + (built.errors || ["unknown error"])[0]); return; }
  const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/character/${encodeURIComponent(cgNpcId)}`, {
    method: "PUT", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ character: built.character }),
  })).json();
  if (res.error) { toast("Save failed: " + res.error); return; }
  if (!(state.characterFiles || []).includes(cgNpcId)) (state.characterFiles = state.characterFiles || []).push(cgNpcId);
  const npc = (state.contents.npcs || []).find(n => n.id === cgNpcId);
  if (npc) { npc.combat_kind = "person"; delete npc.stat_block; }
  markDirty();
  closeEditor();
  toast("Character built and saved.");
}

function confirmFaction(original) {
  const name = document.getElementById("f_name").value.trim();
  if (!name) { fieldInvalid("f_name", "Please give the faction a name."); return; }
  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(name), new Set(listOf("factions").map(x => x.id)));
  base.name = name;
  const setOrDel = (k, val) => { if (val === "" || val == null) delete base[k]; else base[k] = val; };
  setOrDel("description", document.getElementById("f_desc").value.trim());
  setOrDel("agenda", document.getElementById("f_agenda").value.trim());
  const standing = Number(document.getElementById("f_standing").value || 0);
  if (standing) base.default_standing = standing; else delete base.default_standing;
  if (document.getElementById("f_known").checked) base.known_from_start = true;
  else delete base.known_from_start;
  commitEntry("factions", original, base);
}

function confirmEvent(original) {
  const title = gid("f_name").value.trim(), err = gid("f_err");
  if (!title) { fieldInvalid("f_name", "Please give the event a title."); return; }
  const onday = gid("f_ev_onday").value, every = gid("f_ev_every").value;
  if (onday === "" && every === "") {
    fieldInvalid("f_ev_onday", "When does it happen? Set a day, a repeat interval, or both."); return; }
  const evs = editorCtx.evs || [];
  if (evs.some(s => !s.faction)) { err.textContent = "Every standing shift needs a faction (or remove it)."; return; }
  if (evs.some(s => !Number(s.delta))) { err.textContent = "Every standing shift needs a non-zero amount (20 = a full tier)."; return; }
  const encPlace = gid("f_ev_encplace").value, encId = gid("f_ev_encid").value;
  if (encPlace && !encId) {
    err.textContent = "Pick which encounter at that place the event arms — author one on the place first."; return; }
  const announce = gid("f_ev_announce").value.trim(), brief = gid("f_ev_brief").value.trim();
  const time = gid("f_ev_time").value, weather = gid("f_ev_weather").value;
  const unlock = gid("f_ev_unlock").value, retire = gid("f_ev_retire").value;
  if (!announce && !brief && !evs.length && !encPlace && !time && !weather && !unlock && !retire) {
    err.textContent = "The event needs something to say or do — an announcement, a briefing, or an effect."; return; }
  if (unlock && unlock === retire) { err.textContent = "An event can't open and close the same quest."; return; }
  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(title), new Set(listOf("events").map(x => x.id)));
  base.title = title;
  const setOrDel = (k, val) => { if (val === "" || val == null) delete base[k]; else base[k] = val; };
  if (onday !== "" && Number(onday) >= 1) base.on_day = Number(onday); else delete base.on_day;
  if (every !== "" && Number(every) >= 1) base.every_days = Number(every); else delete base.every_days;
  setOrDel("quest_done", gid("f_ev_qdone").value);
  const msfac = gid("f_ev_msfac");
  if (msfac && msfac.value) base.min_standing = { faction: msfac.value, tier: gid("f_ev_mstier").value };
  else delete base.min_standing;
  setOrDel("place", gid("f_ev_place").value);
  setOrDel("announce", announce);
  setOrDel("briefing", brief);
  if (evs.length) base.standing = evs.map(s =>
    ({ faction: s.faction, delta: Math.max(-50, Math.min(50, Number(s.delta))) }));
  else delete base.standing;
  if (encPlace && encId) base.encounter = { place: encPlace, encounter: encId };
  else delete base.encounter;
  if (time || weather) {
    base.environment = {};
    if (time) base.environment.time_of_day = time;
    if (weather) base.environment.weather = weather;
  } else delete base.environment;
  setOrDel("unlock_quest", unlock);
  setOrDel("retire_quest", retire);
  commitEntry("events", original, base);
}

    s.addEventListener("change", e => { editorCtx.trinkets[+e.target.dataset.tkWhen].when = e.target.value; renderTrinkets(); }));
  box.querySelectorAll("[data-tk-out]").forEach(inp =>
    inp.addEventListener("input", e => { editorCtx.trinkets[+e.target.dataset.tkOut].outcome = e.target.value; }));
  box.querySelectorAll("[data-tk-del]").forEach(b =>
    b.addEventListener("click", e => { editorCtx.trinkets.splice(+e.target.dataset.tkDel, 1); renderTrinkets(); }));
}
// Trinket art keeps its alpha channel (torn edges are the point) — resize on a bare
// canvas and save as PNG, unlike illustrations, which flatten to JPEG.
function resizeKeepAlpha(file, maxW) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      resolve(c.toDataURL("image/png"));
    };
    img.onerror = () => reject(new Error("could not read that image"));
    img.src = URL.createObjectURL(file);
  });
}
async function onChooseTrinketImage(file) {
  const i = editorCtx._tkImgFor;
  if (i == null || !editorCtx.trinkets[i]) return;
  const title = document.getElementById("f_title").value.trim();
  if (!title) { fieldInvalid("f_title", "Name the quest first, then add its trinket art."); return; }
  try {
    const dataUrl = await resizeKeepAlpha(file, 900);
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/image`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: `trinket-${slugify(title)}-${i + 1}.png`, data: dataUrl }),
    })).json();
    if (res.error) { toast(res.error); return; }
    editorCtx.trinkets[i].image = res.filename;
    renderTrinkets();
  } catch (e) { toast(String(e.message || e)); }
}

function confirmQuest(original) {
  const title = document.getElementById("f_title").value.trim(), err = document.getElementById("f_err");
  if (!title) { fieldInvalid("f_title", "Please give the quest a title."); return; }
  const srcType = document.getElementById("f_srctype").value;
  const giverNpc = document.getElementById("f_giver_npc").value;
  const giverPlace = document.getElementById("f_giver_place").value;
  const discovery = document.getElementById("f_discovery").value.trim();
  if (srcType === "npc" && !giverNpc) { fieldInvalid("f_giver_npc", "Choose the character who gives this quest."); return; }
  if (srcType === "place" && !giverPlace) { fieldInvalid("f_giver_place", "Choose the place where this quest is found."); return; }
  if (srcType === "place" && !discovery) { fieldInvalid("f_discovery", "Say how it's found (e.g. a notice board)."); return; }
  const branches = editorCtx.branches.filter(b => b.outcome.trim() && b.to);
  if (branches.length !== editorCtx.branches.length) {
    document.querySelectorAll("[data-br-outcome]").forEach(i => { if (!i.value.trim()) i.classList.add("bad"); });
    markEmptyRows("data-br-to");
    err.textContent = "Every outcome needs both a label and a target quest (or remove it)."; return; }
  if (editorCtx.trinkets.some(t => !t.image)) {
    err.textContent = "Every trinket needs an image (or remove it)."; return; }
  const branchLabels = new Set(branches.map(b => b.outcome.trim()));
  for (const t of editorCtx.trinkets) {
    if (t.when !== "accepted" && (t.outcome || "").trim() && !branchLabels.has(t.outcome.trim())) {
      err.textContent = `A trinket is tied to the outcome “${t.outcome.trim()}”, which isn't one of this quest's outcomes.`; return; }
  }
  const qstanding = editorCtx.qstanding || [];
  if (qstanding.some(s => !s.faction)) {
    markEmptyRows("data-qs-fac");
    err.textContent = "Every standing consequence needs a faction (or remove it)."; return; }
  if (qstanding.some(s => !Number(s.delta))) {
    err.textContent = "Every standing consequence needs a non-zero shift (20 = a full tier)."; return; }
  for (const s of qstanding) {
    if (s.when !== "accepted" && (s.outcome || "").trim() && !branchLabels.has(s.outcome.trim())) {
      err.textContent = `A standing consequence is tied to the outcome “${s.outcome.trim()}”, which isn't one of this quest's outcomes.`; return; }
  }

  const base = original ? { ...original } : {};
  if (!base.id) base.id = uniqueId(slugify(title), new Set(listOf("quests").map(x => x.id)));
  base.title = title;
  const setOrDel = (k, val) => { if (val === "" || val == null || (Array.isArray(val) && !val.length)) delete base[k]; else base[k] = val; };
  setOrDel("hook", document.getElementById("f_hook").value.trim());
  setOrDel("briefing", document.getElementById("f_brief").value.trim());
  setOrDel("rumor", document.getElementById("f_rumor").value.trim());
  if (srcType === "npc") { base.giver_npc = giverNpc; delete base.giver_place; delete base.discovery; }
  else { base.giver_place = giverPlace; base.discovery = discovery; delete base.giver_npc; }
  const gold = document.getElementById("f_rgold").value, item = document.getElementById("f_ritem").value;
  const qty = Number(document.getElementById("f_rqty").value || 1);
  const note = document.getElementById("f_rnote").value.trim();
  const reward = {};
  if (gold !== "" && Number(gold) > 0) reward.gold = Number(gold);     // gold OR item, never both
  else if (item) { reward.item = item; if (qty && qty !== 1) reward.qty = qty; }
  if (note) reward.note = note;
  if (Object.keys(reward).length) base.reward = reward; else delete base.reward;
  if (document.getElementById("f_root").checked) base.root = true; else delete base.root;
  const minlvl = document.getElementById("f_minlvl").value;
  if (minlvl !== "" && Number(minlvl) > 1) base.min_party_level = Number(minlvl); else delete base.min_party_level;
  setOrDel("chain", document.getElementById("f_chain").value.trim());
  if (branches.length) base.branches = branches.map(b => ({ outcome: b.outcome.trim(), to: b.to }));
  else delete base.branches;
  if (editorCtx.trinkets.length) {
    const used = new Set(editorCtx.trinkets.map(t => t.id).filter(Boolean));
    base.trinkets = editorCtx.trinkets.map((t, i) => {
      let id = t.id;                       // an id, once minted, is stable — the player's
      if (!id) {                           // journal keys on it across pack edits
        id = uniqueId("trinket" + (i + 1), used); used.add(id);
      }
      const out = { id, image: t.image, when: t.when === "accepted" ? "accepted" : "completed" };
      if ((t.caption || "").trim()) out.caption = t.caption.trim();
      if (out.when === "completed" && (t.outcome || "").trim()) out.outcome = t.outcome.trim();
      return out;
    });
  } else delete base.trinkets;
  if (qstanding.length) {
    base.standing = qstanding.map(s => {
      const out = { faction: s.faction,
                    delta: Math.max(-50, Math.min(50, Number(s.delta))),
                    when: s.when === "accepted" ? "accepted" : "completed" };
      if (out.when === "completed" && (s.outcome || "").trim()) out.outcome = s.outcome.trim();
      return out;
    });
  } else delete base.standing;
  const msfacEl = document.getElementById("f_msfac");
  if (msfacEl && msfacEl.value) {
    base.min_standing = { faction: msfacEl.value, tier: document.getElementById("f_mstier").value };
  } else delete base.min_standing;
  setOrDel("tags", csv(document.getElementById("f_tags").value));
  commitEntry("quests", original, base);
}

function commitEntry(kind, original, entry) {
  if (!Array.isArray(state.contents[kind])) state.contents[kind] = [];
  if (original != null && editorCtx.index != null) state.contents[kind][editorCtx.index] = entry;
  else state.contents[kind].push(entry);
  closeEditor();
  markDirty();
}

// --- map editor (pins on an assignable map image; positions persist to places.json) ---
// A place is a PIN at {x, y} percent of the current map image's "stage" (its contain-
// rect), so pins stay aligned to the art across screen sizes — the game reuses the same
// percentages. Top-level pins sit on the world map (pack.world_map); double-click a ★
// area to drill into ITS map (place.map_image) and arrange the places inside. Two levels
// only — children of children aren't a thing. Exits are still edited in the per-place
// form, but we DRAW them here so the board reads like a map.
let mapPath = [];          // [] = world (top) level; [areaId] = inside that area

const placeById = id => listOf("places").find(p => p.id === id);
const childrenOf = areaId => listOf("places").filter(p => (p.parent || null) === (areaId || null));
const hasChildren = id => listOf("places").some(p => p.parent === id);
const currentAreaId = () => (mapPath.length ? mapPath[mapPath.length - 1] : null);
const mapLevelPlaces = () => childrenOf(currentAreaId());

// Deterministic fallback spot for a place with no authored position (a ring), so
// unplaced places fan out instead of stacking — dragging then pins a real position.
function fallbackPos(i, n) {
  if (n <= 1) return { x: 50, y: 50 };
  const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
  return { x: 50 + Math.cos(ang) * 30, y: 50 + Math.sin(ang) * 30 };
}
function nodePos(p, i, n) {
  const q = p.position;
  if (q && typeof q.x === "number" && typeof q.y === "number") return q;
  return fallbackPos(i, n);
}
// Keep a pin's hover tooltip inside the canvas: flip it above the pin when the pin is
// low, and anchor it inward when the pin is near the left/right edge.
function flipClasses(x, y) {
  return (y > 55 ? " flip-up" : "") + (x < 18 ? " x-left" : (x > 82 ? " x-right" : ""));
}
// The background image for the level we're viewing: the pack's world map at the top,
// or the drilled-into area's own map_image.
function currentBg() {
  const a = currentAreaId();
  if (a == null) return (state.contents.pack && state.contents.pack.world_map) || null;
  const p = placeById(a); return p ? (p.map_image || null) : null;
}

// Two-pin travel calibration (living-world W3): pick two PINNED places on the
// map being viewed and state the days between them — every other journey on
// that map derives its time from the pair. One scale per world (it lives in
// the manifest); setting it from another level moves the calibration there.
function tsLabel(ts) { return `${placeName(ts.a)} ↔ ${placeName(ts.b)} = ${ts.days} day(s)`; }
function travelScaleRow(places) {
  const pinned = places.filter(p => p.position && typeof p.position.x === "number");
  const ts = (state.contents.pack || {}).travel_scale || null;
  const onThisMap = ts && pinned.some(p => p.id === ts.a) && pinned.some(p => p.id === ts.b);
  if (pinned.length < 2) {
    return ts ? `<div class="map-hint" style="margin-bottom:8px">🕰 Travel scale: ${esc(tsLabel(ts))}
      <button class="btn mini danger" id="tsClear" style="margin-left:8px">Remove</button></div>` : "";
  }
  // A calibration living on ANOTHER map must not masquerade as this map's:
  // blank pickers + a fresh day count here; only the note names the real one.
  const opts = key => (onThisMap ? "" : `<option value="">(choose a place)</option>`)
    + pinned.map(p =>
      `<option value="${esc(p.id)}"${onThisMap && ts[key] === p.id ? " selected" : ""}>${esc(p.name)}</option>`).join("");
  return `<div class="map-hint" style="margin-bottom:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap">
    <span>🕰 Travel scale:</span>
    <select id="tsA">${opts("a")}</select> <span>↔</span> <select id="tsB">${opts("b")}</select>
    <span>=</span> <input id="tsDays" type="number" min="0.5" max="365" step="0.5" value="${onThisMap ? ts.days : 1}" style="width:76px" />
    <span>day(s) of travel</span>
    <button class="btn mini" id="tsSet">${onThisMap ? "Update" : "Set"}</button>
    ${ts ? `<button class="btn mini danger" id="tsClear">Remove</button>` : ""}
    <span style="opacity:.65">${ts && !onThisMap ? `currently: ${esc(tsLabel(ts))} (another map)` :
      "pick two pins and say how far apart they are — every other journey here derives. No scale = travel takes no time."}</span>
  </div>`;
}
function openMap() { if (!state.contents) return; mapPath = []; document.getElementById("mapScrim").classList.add("open"); renderMap(); }
function closeMap() { document.getElementById("mapScrim").classList.remove("open"); }

function renderMap() {
  const body = document.getElementById("mapBody");
  const places = mapLevelPlaces();
  const n = places.length;
  const inside = currentAreaId() != null;
  const crumbs = [`<span class="crumb${inside ? "" : " here"}" data-crumb="-1">World map</span>`]
    .concat(mapPath.map((id, idx) => {
      const here = idx === mapPath.length - 1;
      return `<span class="crumb-sep">▸</span><span class="crumb${here ? " here" : ""}" data-crumb="${idx}">${esc(placeName(id))}</span>`;
    })).join("");
  const bg = currentBg();
  const bgImg = bg
    ? `<img class="map-bg" id="mapBgImg" src="/api/pack/${encodeURIComponent(state.id)}/image/${encodeURIComponent(bg)}?b=${Date.now()}" alt="" />` : "";
  const pins = places.map((p, i) => {
    const pos = nodePos(p, i, n);
    const isArea = !inside && hasChildren(p.id);   // drillable only from the top level
    const tipDesc = p.description ? `<div class="tdesc">${esc(p.description)}</div>` : "";
    const tipHint = isArea ? `<div class="tdesc" style="color:var(--gold)">▣ double-click to open its map</div>` : "";
    return `<div class="map-pin${isArea ? " area" : ""}${flipClasses(pos.x, pos.y)}" data-node="${esc(p.id)}" style="left:${pos.x}%;top:${pos.y}%">
      <div class="pin-dot"><span class="pin-glyph">${isArea ? "★" : ""}</span></div>
      <div class="tip"><div class="tname">${esc(p.name)}</div>${tipDesc}${tipHint}</div></div>`;
  }).join("");
  const empty = pins ? "" : `<div class="map-empty">No places ${inside ? "inside this area" : "at the top level"} yet — add places (and set their “Part of (area)”) to see them here.</div>`;
  body.innerHTML = `
    <div class="map-top">
      <div class="crumbs">${crumbs}</div>
      <span style="flex:1"></span>
      <div class="map-bgctl">
        <button class="btn mini" id="mapBgSet">${bg ? "Replace map image" : "Set map image"}</button>
        ${bg ? '<button class="btn mini danger" id="mapBgClear">Remove map image</button>' : ""}
        <input type="file" id="mapBgFile" accept="image/png,image/jpeg,image/webp" style="display:none" />
      </div>
    </div>
    ${travelScaleRow(places)}
    <div class="map-hint" style="margin-bottom:8px">Drag pins to place them${inside ? "" : "; double-click a ★ area to arrange the places inside it"}. Hover a pin for its name &amp; description.</div>
    <div class="map-canvas" id="mapCanvas">
      <div class="map-stage" id="mapStage">${bgImg}<svg class="map-edges" id="mapEdges"></svg>${pins}</div>
      ${empty}
    </div>`;
  body.querySelectorAll("[data-crumb]").forEach(c => c.addEventListener("click", () => {
    const idx = +c.dataset.crumb; mapPath = idx < 0 ? [] : mapPath.slice(0, idx + 1); renderMap();
  }));
  body.querySelectorAll("[data-node]").forEach(el => {
    el.addEventListener("pointerdown", e => startNodeDrag(e, el));
    el.addEventListener("dblclick", () => { const id = el.dataset.node; if (currentAreaId() == null && hasChildren(id)) { mapPath = [id]; renderMap(); } });
  });
  const tsSet = document.getElementById("tsSet");
  if (tsSet) tsSet.addEventListener("click", () => {
    const a = document.getElementById("tsA").value, b = document.getElementById("tsB").value;
    const days = Number(document.getElementById("tsDays").value || 0);
    if (!a || !b) { toast("Pick two places first."); return; }
    if (a === b) { toast("Pick two different places."); return; }
    if (!(days > 0)) { toast("How many days of travel sit between them?"); return; }
    state.contents.pack.travel_scale = { a, b, days };
    markDirty(); renderMap();
    toast("Travel scale set — journeys on this map now take time.");
  });
  const tsClear = document.getElementById("tsClear");
  if (tsClear) tsClear.addEventListener("click", () => {
    delete state.contents.pack.travel_scale;
    markDirty(); renderMap();
    toast("Travel scale removed — journeys take no time again.");
  });
  document.getElementById("mapBgSet").addEventListener("click", () => document.getElementById("mapBgFile").click());
  document.getElementById("mapBgFile").addEventListener("change", e => { if (e.target.files[0]) onChooseMapBg(e.target.files[0]); });
  const clr = document.getElementById("mapBgClear");
  if (clr) clr.addEventListener("click", clearCurrentBg);
  const img = document.getElementById("mapBgImg");
  if (img) img.addEventListener("load", layoutStage);
  layoutStage();
}

// Size the stage to the map image's contain-rect (or the whole canvas when there's no
// image), so pin percentages land on the same spot of the art everywhere.
function layoutStage() {
  const canvas = document.getElementById("mapCanvas"), stage = document.getElementById("mapStage");
  if (!canvas || !stage) return;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const img = document.getElementById("mapBgImg");
  let sw = cw, sh = ch;
  if (img && img.naturalWidth && img.naturalHeight) {
    const scale = Math.min(cw / img.naturalWidth, ch / img.naturalHeight);
    sw = img.naturalWidth * scale; sh = img.naturalHeight * scale;
  }
  stage.style.width = sw + "px"; stage.style.height = sh + "px";
  stage.style.left = ((cw - sw) / 2) + "px"; stage.style.top = ((ch - sh) / 2) + "px";
  drawEdges();
}

function drawEdges() {
  const stage = document.getElementById("mapStage");
  if (!stage) return;
  const places = mapLevelPlaces(), n = places.length;
  const idx = new Map(places.map((p, i) => [p.id, { p, i }]));
  const W = stage.clientWidth, H = stage.clientHeight;
  const at = (p, i) => { const q = nodePos(p, i, n); return [q.x / 100 * W, q.y / 100 * H]; };
  let lines = "";
  places.forEach((p, i) => {
    const [x1, y1] = at(p, i);
    (p.exits || []).forEach(ex => {
      const t = idx.get(ex.to); if (!t) return;     // only draw exits within this level
      const [x2, y2] = at(t.p, t.i);
      lines += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" />`;
    });
  });
  const svg = document.getElementById("mapEdges");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.innerHTML = lines;
}

function startNodeDrag(e, el) {
  if (e.button != null && e.button !== 0) return;
  const stage = document.getElementById("mapStage");
  const place = placeById(el.dataset.node);
  const startX = e.clientX, startY = e.clientY;
  let dragging = false;
  el.setPointerCapture(e.pointerId);
  const onMove = ev => {
    if (!dragging && Math.hypot(ev.clientX - startX, ev.clientY - startY) < 4) return;  // let dbl-click through
    dragging = true; el.classList.add("dragging");
    const r = stage.getBoundingClientRect();
    const x = Math.max(0, Math.min(100, (ev.clientX - r.left) / r.width * 100));
    const y = Math.max(0, Math.min(100, (ev.clientY - r.top) / r.height * 100));
    el.style.left = x + "%"; el.style.top = y + "%";
    el.classList.toggle("flip-up", y > 55);
    el.classList.toggle("x-left", x < 18);
    el.classList.toggle("x-right", x > 82);
    place.position = { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
    drawEdges();
  };
  const onUp = () => {
    el.releasePointerCapture(e.pointerId);
    el.removeEventListener("pointermove", onMove);
    el.removeEventListener("pointerup", onUp);
    el.classList.remove("dragging");
    if (dragging) markDirty();    // re-renders the (background) detail; the map overlay stays put
  };
  el.addEventListener("pointermove", onMove);
  el.addEventListener("pointerup", onUp);
}

// Assign / replace / clear the background map image for the current level (world map at
// the top; the drilled area's map_image inside). Reuses the pack image upload + the
// browser-side resize the illustration flow already uses.
async function onChooseMapBg(file) {
  try {
    const dataUrl = await resizeToDataUrl(file, 1600);
    const areaId = currentAreaId();
    const baseName = areaId == null
      ? slugify((state.contents.pack && state.contents.pack.name) || "world") + "_map"
      : slugify(placeById(areaId).name) + "_map";
    const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/image`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: baseName + ".jpg", data: dataUrl }),
    })).json();
    if (res.error) { toast(res.error); return; }
    setCurrentBg(res.filename);
  } catch (e) { toast(String(e.message || e)); }
}
function setCurrentBg(filename) {
  const areaId = currentAreaId();
  if (areaId == null) { state.contents.pack = state.contents.pack || {}; state.contents.pack.world_map = filename; }
  else { const p = placeById(areaId); if (p) p.map_image = filename; }
  markDirty(); renderMap();
}
function clearCurrentBg() {
  const areaId = currentAreaId();
  if (areaId == null) { if (state.contents.pack) delete state.contents.pack.world_map; }
  else { const p = placeById(areaId); if (p) delete p.map_image; }
  markDirty(); renderMap();
}

// --- save ------------------------------------------------------------------
async function saveWorld() {
  if (!state.id || !state.dirty) return;
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  const res = await (await fetch(`/api/pack/${encodeURIComponent(state.id)}/save`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: state.contents }),
  })).json();
  if (res.error) { toast(res.error); btn.disabled = false; return; }
  state.validation = res.validation; state.dirty = false;
  // The save swept side-files whose owner is gone (an abandoned clone's combat
  // copy, a deleted person's snapshot) — keep the editor's badges honest.
  for (const f of res.pruned || []) {
    const stem = f.replace(/^(monsters|characters)\//, "").replace(/\.json$/, "");
    if (f.startsWith("monsters/")) state.monsterFiles = (state.monsterFiles || []).filter(id => id !== stem);
    else state.characterFiles = (state.characterFiles || []).filter(id => id !== stem);
  }
  document.getElementById("dirty").style.display = "none";
  render(); loadWorlds();
  const tidied = (res.pruned || []).length ? ` (tidied ${res.pruned.length} leftover combat file${res.pruned.length > 1 ? "s" : ""})` : "";
  toast(res.validation.ok ? `Saved ✓ — previous version backed up${tidied}` : `Saved — previous version backed up (still has issues to fix)${tidied}`);
}

async function newWorld() {
  if (state.dirty && !confirm("You have unsaved changes. Discard them and start a new world?")) return;
  const name = prompt("Name your new world:");
  if (!name || !name.trim()) return;
  const res = await (await fetch("/api/pack/new", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name.trim() }),
  })).json();
  if (res.error) { toast(res.error); return; }
  await loadWorlds();
  await openWorld(res.id);
  toast("New world created — start adding to it!");
}

// --- world portability (v0.9): one zip out, one zip in ----------------------
function exportWorld() {
  if (!state.id) return;
  if (state.dirty && !confirm("Export reads the last SAVED version — your unsaved changes won't be in the zip. Export anyway?")) return;
  window.location.href = `/api/pack/${encodeURIComponent(state.id)}/export`;
}
async function importWorld(file) {
  const data = await file.arrayBuffer();
  const post = async (overwrite) =>
    (await fetch(`/api/pack/import${overwrite ? "?overwrite=true" : ""}`, {
      method: "POST", headers: { "Content-Type": "application/zip" }, body: data,
    })).json();
  let res = await post(false);
  if (res.exists) {
    if (!confirm(`A world called “${res.name}” is already installed. Replace it? (The current copy is backed up first.)`)) return;
    res = await post(true);
  }
  if (!res.ok) { toast((res.errors || ["import failed"])[0]); return; }
  await loadWorlds();
  await openWorld(res.id);
  toast(res.validation && res.validation.ok
    ? `“${res.name}” imported ✓ — ready to play`
    : `“${res.name}” imported — it has issues to fix (see the report)`);
}

document.getElementById("saveBtn").addEventListener("click", saveWorld);
document.getElementById("newWorldBtn").addEventListener("click", newWorld);
document.getElementById("exportBtn").addEventListener("click", exportWorld);
document.getElementById("importWorldBtn").addEventListener("click", () => {
  if (state.dirty && !confirm("You have unsaved changes. Import another world anyway?")) return;
  document.getElementById("importWorldFile").click();
});
document.getElementById("importWorldFile").addEventListener("change", e => {
  const f = e.target.files[0];
  e.target.value = "";                 // same file re-picks must re-fire
  if (f) importWorld(f);
});
document.getElementById("mapBtn").addEventListener("click", openMap);
document.getElementById("mapClose").addEventListener("click", closeMap);
// Editor modals hold WORK IN PROGRESS (a half-written description, a statblock mid-edit) —
// they close ONLY via their own Cancel/Save buttons. A stray click on the scrim or an
// accidental Escape must never throw the author's work away. The map overlay still closes
// on Escape: it holds no unsaved typing (pins live in world state until Save world).
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (!editorCtx && document.getElementById("mapScrim").classList.contains("open")) closeMap();
});
window.addEventListener("resize", () => { if (document.getElementById("mapScrim").classList.contains("open")) layoutStage(); });
document.getElementById("rootBadge").textContent = "reading from content/packs";
loadWorlds();
</script>
